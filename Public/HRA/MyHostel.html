<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Hostel · HRA · BIU BedCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f5f1e8;
            color: #17233c;
            min-height: 100vh;
        }

        /* ----- LAYOUT (HRA) ----- */
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar {
            position: fixed;
            inset: 0 0 0 0;
            width: 16rem;
            background-color: #10233f;
            color: white;
            padding: 1.5rem 1rem;
            display: none;
            flex-direction: column;
            z-index: 30;
        }
        @media (min-width: 1024px) { .sidebar { display: flex; } }

        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .sidebar .brand-badge {
            display: grid;
            place-items: center;
            width: 2.75rem;
            height: 2.75rem;
            border: 1px solid rgba(225,189,101,0.7);
            background-color: #d6ad4b;
            border-radius: 0.5rem;
            font-family: 'Merriweather',serif;
            font-weight: 900;
            font-size: 1.25rem;
            color: #10233f;
        }
        .sidebar .brand-text {
            font-family: 'Merriweather',serif;
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.2;
            color: white;
        }
        .sidebar .brand-sub {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #b9c7db;
        }
        .sidebar .workspace-label {
            margin-top: 2.25rem;
            padding: 0 0.75rem;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #b9c7db;
        }
        .sidebar nav {
            margin-top: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: transparent;
            color: #dce5f2;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .nav-item i { width: 1.2rem; text-align: center; font-size: 1rem; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: #d6ad4b; color: #10233f; }

        .sidebar .role-card {
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 0.75rem;
            padding: 0.75rem;
        }
        .sidebar .role-card .role-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .sidebar .role-card .role-title i { color: #e1bd65; }
        .sidebar .role-card .role-scope {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: #b9c7db;
            line-height: 1.4;
        }

        .main-content {
            flex: 1;
            min-height: 100vh;
            padding-bottom: 2rem;
        }
        @media (min-width: 1024px) { .main-content { margin-left: 16rem; } }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid #dfd8cb;
            background: rgba(245,241,232,0.95);
            backdrop-filter: blur(4px);
            padding: 0.75rem 1rem;
        }
        @media (min-width: 640px) { .main-header { padding: 0.75rem 1.75rem; } }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .menu-toggle {
            border: 1px solid #d8d0c2;
            border-radius: 0.5rem;
            background: transparent;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            color: #17233c;
        }
        .menu-toggle:hover { background: rgba(0,0,0,0.05); }
        @media (min-width: 1024px) { .menu-toggle { display: none; } }

        .header-date {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6b778b;
        }
        .header-title {
            font-family: 'Merriweather',serif;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (min-width: 640px) { .header-right { gap: 0.75rem; } }

        .notif-btn {
            position: relative;
            background: transparent;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: #43516a;
            cursor: pointer;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .notif-btn:hover { background: rgba(0,0,0,0.05); }
        .notif-badge {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            width: 0.5rem;
            height: 0.5rem;
            background: #b34a3b;
            border-radius: 50%;
        }
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #d8d0c2;
            border-radius: 0.5rem;
            background: #fffcf6;
            padding: 0.25rem 0.5rem 0.25rem 0.25rem;
            cursor: pointer;
            text-decoration: none;
            color: #17233c;
        }
        .profile-btn:hover { background: #f5f1e8; }
        .profile-avatar {
            display: grid;
            place-items: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: #d6ad4b;
            font-size: 0.6rem;
            font-weight: 700;
            color: #10233f;
        }
        .profile-name {
            display: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .profile-role {
            display: none;
            font-size: 0.6rem;
            color: #68768a;
        }
        .logout-btn {
            background: transparent;
            border: none;
            color: #68768a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.5rem;
        }
        .logout-btn:hover { color: #17233c; }
        @media (min-width: 640px) {
            .profile-name { display: block; }
            .profile-role { display: block; }
        }

        .content-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.75rem 1rem;
        }
        @media (min-width: 640px) { .content-container { padding: 1.75rem 1.75rem; } }

        .notice-banner {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #d8c79e;
            border-radius: 0.5rem;
            background: #fff9e9;
            color: #675121;
            font-size: 0.9rem;
        }
        .notice-banner i { margin-top: 0.15rem; font-size: 1rem; }

        /* ===== HRA "MY HOSTEL" SPECIFICS ===== */
        .page-heading {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 640px) {
            .page-heading { flex-direction: row; justify-content: space-between; align-items: flex-end; }
        }
        .page-heading .eyebrow {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a77915;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .page-heading h1 {
            font-family: 'Merriweather',serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.15rem;
        }
        @media (min-width: 640px) { .page-heading h1 { font-size: 2.25rem; } }
        .page-heading .desc {
            margin-top: 0.25rem;
            font-size: 0.9rem;
            color: #5c6a7d;
        }
        .page-heading .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: #10233f;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-primary:hover { background: #18345a; }
        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border: 1px solid #bfc8d5;
            border-radius: 0.5rem;
            background: #fffcf6;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            color: #17233c;
        }
        .btn-outline:hover { background: #f5f1e8; }
        .btn-ghost {
            background: transparent;
            border: none;
            font-weight: 700;
            color: #926a13;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .btn-ghost i { margin-right: 0.25rem; }

        .metric-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr 1fr;
        }
        @media (min-width: 640px) { .metric-grid { grid-template-columns: repeat(4, 1fr); } }
        .metric-card {
            padding: 1rem;
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
        }
        .metric-icon {
            display: inline-flex;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        .metric-icon.navy { background: #e7edf5; color: #24466f; }
        .metric-icon.gold { background: #fff1c9; color: #8b6513; }
        .metric-icon.red { background: #f9e2de; color: #9c3e32; }
        .metric-icon.gray { background: #eceff2; color: #536274; }
        .metric-icon.green { background: #e1f0e5; color: #2d6545; }
        .metric-value {
            margin-top: 0.75rem;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .metric-title {
            margin-top: 0.25rem;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .metric-detail {
            margin-top: 0.15rem;
            font-size: 0.75rem;
            color: #6b778b;
        }

        .card {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1.25rem;
        }
        .card-title {
            font-family: 'Merriweather',serif;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-draft { background: #e8edf2; color: #536274; }
        .badge-approved { background: #e1f0e5; color: #2d6545; }
        .badge-present { background: #e1f0e5; color: #2d6545; }
        .badge-absent { background: #f8e1dc; color: #9b3c31; }
        .badge-late { background: #fff0cb; color: #8a6413; }
        .badge-excused { background: #e7edf5; color: #315b8a; }
        .badge-active { background: #e1f0e5; color: #2d6545; }
        .badge-suspended { background: #f8e1dc; color: #9b3c31; }

        .grid-2 { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
        .grid-3 { display: grid; gap: 1rem; grid-template-columns: repeat(3, 1fr); }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 480px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .text-sm { font-size: 0.9rem; }
        .text-xs { font-size: 0.7rem; }
        .text-muted { color: #68768a; }
        .text-gold { color: #a77915; }
        .font-bold { font-weight: 700; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .border-t { border-top: 1px solid #ded6c9; }

        .progress-bar {
            height: 0.4rem;
            overflow: hidden;
            border-radius: 9999px;
            background: #e6e2da;
        }
        .progress-bar .fill {
            height: 100%;
            background: #3f755d;
            border-radius: 9999px;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            background: #10233f;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #3f755d; }
        .toast.error { background: #a84134; }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .loading-spinner i { font-size: 2rem; color: #a77915; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-info .user-details {
            display: none;
            text-align: right;
        }
        .user-info .user-details .user-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .user-info .user-details .user-role {
            font-size: 0.6rem;
            color: #68768a;
        }
        @media (min-width: 640px) { .user-info .user-details { display: block; } }

        .status-dot {
            display: inline-block;
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
        }
        .status-dot.green { background: #2d6545; }
        .status-dot.gold { background: #d6ad4b; }
        .status-dot.red { background: #a84134; }

        /* ----- HOSTEL TREE WITH DROPDOWN ----- */
        .hostel-tree {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1rem;
            max-height: 450px;
            overflow-y: auto;
        }
        .hostel-tree .tree-item {
            padding: 0.4rem 0.4rem 0.4rem 1.2rem;
            cursor: pointer;
            border-radius: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .hostel-tree .tree-item:hover { background: #f5f1e8; }
        .hostel-tree .tree-item.active { background: #e7edf5; font-weight: 700; }
        .hostel-tree .tree-item .level-icon { color: #a77915; width: 1.2rem; }
        .hostel-tree .tree-item .room-badge {
            margin-left: auto;
            font-size: 0.6rem;
            background: #e8edf2;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
        }

        .floor-dropdown {
            border: 1px solid #eee8de;
            border-radius: 0.5rem;
            margin-bottom: 0.3rem;
            overflow: hidden;
        }
        .floor-dropdown .dropdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: #fbf7ef;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            color: #10233f;
            transition: background 0.15s;
            user-select: none;
        }
        .floor-dropdown .dropdown-header:hover { background: #f5f1e8; }
        .floor-dropdown .dropdown-header .chevron { transition: transform 0.2s ease; }
        .floor-dropdown .dropdown-header .chevron.open { transform: rotate(180deg); }
        .floor-dropdown .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .floor-dropdown .dropdown-content.open { max-height: 500px; }
        .floor-dropdown .dropdown-content .tree-item {
            padding-left: 1.8rem;
            border-bottom: 1px solid #f5f1e8;
        }
        .floor-dropdown .dropdown-content .tree-item:last-child { border-bottom: none; }

        .room-detail-card {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1rem;
        }
        .bed-slot {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #eee8de;
            cursor: pointer;
        }
        .bed-slot:hover { background: #f5f1e8; }
        .bed-slot:last-child { border-bottom: none; }
        .bed-slot .bed-status {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .bed-slot .bed-status.present { background: #2d6545; }
        .bed-slot .bed-status.absent { background: #a84134; }
        .bed-slot .bed-status.manual { background: #d09b2e; }
        .bed-slot .bed-status.vacant { background: #b9c7db; }

        .student-info-panel {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1rem;
        }
        .student-info-panel .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #f0ebe2;
            font-size: 0.9rem;
        }
        .student-info-panel .info-row:last-child { border-bottom: none; }
        .student-info-panel .info-label { color: #68768a; font-weight: 500; }
        .student-info-panel .info-value { font-weight: 600; }

        .occupancy-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .occ-dot {
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 0.25rem;
            display: inline-block;
        }
        .occ-dot.full { background: #2d6545; }
        .occ-dot.available { background: #d6ad4b; }
        .occ-dot.maintenance { background: #a84134; }

        .activity-item {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0ebe2;
            font-size: 0.9rem;
        }
        .activity-item:last-child { border-bottom: none; }

        /* QR status chip */
        .qr-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #e1f0e5;
            color: #2d6545;
            border: 1px solid #b8d4c4;
        }
        .qr-chip.inactive {
            background: #e8edf2;
            color: #536274;
            border-color: #cbd2db;
        }
        .qr-chip .qr-dot {
            width: 0.4rem;
            height: 0.4rem;
            border-radius: 50%;
            display: inline-block;
        }
        .qr-chip .qr-dot.active { background: #2d6545; }
        .qr-chip .qr-dot.inactive { background: #8a3328; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e8e4de; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #d6ad4b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #c49a2a; }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- ===== PORTAL (HRA) ===== -->
    <div class="app-wrapper">
        <!-- Sidebar (HRA) -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-badge">BIU</div>
                <div>
                    <div class="brand-text">BIU BedCheck</div>
                    <div class="brand-sub">Management System</div>
                </div>
            </div>
            <p class="workspace-label">Workspace</p>
            <nav id="desktopNav">
                <a href="hra-index.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="MyHostel.html" class="nav-item active"><i class="fas fa-building"></i> My Hostel</a>
                <a href="BedCheck.html" class="nav-item"><i class="fas fa-clipboard-check"></i> Review BedCheck</a>
                <a href="Reports.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
                <a href="Notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
                <a href="Profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <div class="role-card">
                <div class="role-title"><i class="fas fa-shield-alt"></i> <span id="roleLabel">HRA</span></div>
                <div class="role-scope" id="roleScope">Loading...</div>
            </div>
        </aside>

        <!-- main content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-inner">
                    <div class="header-left">
                        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                        <div>
                            <p class="header-date" id="currentDate">Loading...</p>
                            <p class="header-title">BIU BedCheck</p>
                        </div>
                    </div>
                    <div class="header-right">
                        <a href="hra-notifications.html" class="notif-btn" id="notifBtn">
                            <i class="fas fa-bell"></i><span class="notif-badge"></span>
                        </a>
                        <div class="user-info" id="userInfo">
                            <div class="user-details">
                                <div class="user-name" id="displayName">User</div>
                                <div class="user-role" id="displayRole">HRA</div>
                            </div>
                            <a href="hra-profile.html" class="profile-btn" id="profileBtn">
                                <span class="profile-avatar" id="profileAvatar">U</span>
                            </a>
                        </div>
                        <button class="logout-btn" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </header>
            <div class="content-container">
                <div class="notice-banner" id="noticeBanner">
                    <i class="fas fa-building"></i>
                    <span id="noticeText">Loading My Hostel...</span>
                </div>
                <div id="screenContent">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            'use strict';

            const API_BASE = 'http://localhost:3000/api';

            // ---------- STATE ----------
            let currentUser = null;
            let hostelData = null;
            let students = [];
            let staff = [];
            let sessionData = null;
            let selectedRoom = null;
            let selectedStudent = null;
            let hostelStructure = null;

            // ---------- DOM REFS ----------
            const screenContent = document.getElementById('screenContent');
            const noticeText = document.getElementById('noticeText');
            const roleLabel = document.getElementById('roleLabel');
            const roleScope = document.getElementById('roleScope');
            const profileAvatar = document.getElementById('profileAvatar');
            const displayName = document.getElementById('displayName');
            const displayRole = document.getElementById('displayRole');
            const logoutBtn = document.getElementById('logoutBtn');
            const menuToggle = document.getElementById('menuToggle');

            // ---------- TOAST ----------
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = `toast ${type}`;
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }

            // ---------- AUTH HELPERS ----------
            function getAuthHeaders() {
                const userData = sessionStorage.getItem('bedcheck_user');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        return { 'X-Staff-ID': user.id };
                    } catch (e) {
                        return {};
                    }
                }
                return {};
            }

            function getStaffId() {
                const userData = sessionStorage.getItem('bedcheck_user');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        return user.id;
                    } catch (e) {
                        return null;
                    }
                }
                return null;
            }

            // ---------- API HELPERS ----------
            async function apiCall(endpoint, options = {}) {
                try {
                    const headers = {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders(),
                        ...(options.headers || {})
                    };

                    let url = `${API_BASE}${endpoint}`;
                    if (endpoint === '/hra/hostel') {
                        const staffId = getStaffId();
                        if (staffId) {
                            url += `?staff_id=${staffId}`;
                        }
                    }

                    const response = await fetch(url, {
                        ...options,
                        headers: headers
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errorText}`);
                    }
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.message || 'API error');
                    }
                    return data;
                } catch (error) {
                    showToast('Error: ' + error.message, 'error');
                    throw error;
                }
            }

            // ---------- UPDATE USER DISPLAY ----------
            function updateUserDisplay() {
                if (currentUser) {
                    const name = currentUser.name || 'User';
                    const initials = currentUser.initials || name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() || 'U';
                    const role = currentUser.role || 'HRA';

                    profileAvatar.textContent = initials;
                    displayName.textContent = name;
                    displayRole.textContent = role;
                    roleLabel.textContent = role;

                    if (hostelData) {
                        roleScope.textContent = hostelData.name + ' Hostel';
                    }
                }
            }

            // ---------- DATA LOADING ----------
            async function loadAllData() {
                try {
                    const userData = sessionStorage.getItem('bedcheck_user');
                    if (userData) {
                        currentUser = JSON.parse(userData);
                    } else {
                        const localUser = localStorage.getItem('bedcheck_user');
                        if (localUser) {
                            currentUser = JSON.parse(localUser);
                            sessionStorage.setItem('bedcheck_user', localUser);
                        } else {
                            window.location.replace('../Login.html');
                            return;
                        }
                    }

                    if (!currentUser || !currentUser.id) {
                        showToast('User not properly authenticated. Please login again.', 'error');
                        setTimeout(() => window.location.replace('../Login.html'), 2000);
                        return;
                    }

                    updateUserDisplay();

                    const hostelRes = await apiCall(`/hra/hostel`);
                    hostelData = hostelRes.data;

                    if (!hostelData) {
                        roleScope.textContent = 'No hostel assigned';
                        showToast('No hostel assigned to this HRA account', 'error');
                        renderMyHostel();
                        return;
                    }

                    roleScope.textContent = hostelData.name + ' Hostel';
                    setNotice(`${hostelData.name} · My Hostel`);
                    updateUserDisplay();

                    const [studentsRes, staffRes, sessionRes] = await Promise.all([
                        apiCall(`/hostels/${hostelData.id}/students`).catch(() => ({ data: [] })),
                        apiCall(`/hostels/${hostelData.id}/staff`).catch(() => ({ data: [] })),
                        apiCall(`/hostels/${hostelData.id}/session`).catch(() => ({ data: null }))
                    ]);

                    students = studentsRes.data || [];
                    staff = staffRes.data || [];
                    sessionData = sessionRes.data || null;

                    buildHostelStructure();

                    const now = new Date();
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    const dateEl = document.getElementById('currentDate');
                    if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', options);

                    renderMyHostel();

                } catch (error) {
                    console.error('Load error:', error);
                    showToast('Error loading data: ' + error.message, 'error');
                    setNotice('Error loading data. Please refresh.');
                    renderMyHostel();
                }
            }

            function setNotice(msg) {
                noticeText.textContent = msg;
            }

            // ---------- BUILD HOSTEL STRUCTURE ----------
            function buildHostelStructure() {
                if (!hostelData) return;

                const type = hostelData.type || 'floor';
                const floors = hostelData.total_floors || 3;
                const roomsPerFloor = hostelData.rooms_per_floor || 18;
                const flats = hostelData.total_flats || 9;
                const roomsPerFlat = hostelData.rooms_per_flat || 4;

                if (type === 'floor') {
                    const floorNames = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
                    const floorData = [];
                    for (let f = 0; f < floors; f++) {
                        const rooms = [];
                        const prefix = floorNames[f] || `F${f+1}`;
                        for (let r = 1; r <= roomsPerFloor; r++) {
                            rooms.push(`${prefix}${String(r).padStart(2, '0')}`);
                        }
                        floorData.push({
                            name: `Floor ${prefix}`,
                            rooms: rooms
                        });
                    }
                    hostelStructure = {
                        name: hostelData.name,
                        type: 'floor',
                        floors: floorData
                    };
                } else {
                    const floorData = [];
                    for (let f = 1; f <= flats; f++) {
                        const rooms = [];
                        const roomCount = (f === 1 || f === 4 || f === 7) ? 3 : roomsPerFlat;
                        for (let r = 1; r <= roomCount; r++) {
                            rooms.push(`F${f}R${r}`);
                        }
                        floorData.push({
                            name: `Flat ${f}`,
                            rooms: rooms
                        });
                    }
                    hostelStructure = {
                        name: hostelData.name,
                        type: 'flat',
                        floors: floorData
                    };
                }

                if (hostelStructure.floors && hostelStructure.floors.length > 0) {
                    const firstFloor = hostelStructure.floors[0];
                    if (firstFloor.rooms && firstFloor.rooms.length > 0) {
                        selectedRoom = firstFloor.rooms[0];
                    }
                }
            }

            // ---------- HELPERS ----------
            function getInitials(name) {
                if (!name) return 'U';
                return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            }

            function attBadge(status) {
                const map = {
                    'Present': 'badge-present',
                    'Absent': 'badge-absent',
                    'Late': 'badge-late',
                    'Manual': 'badge-draft',
                    'Excused': 'badge-excused'
                };
                return `<span class="badge ${map[status] || 'badge-draft'}">${status || 'Unknown'}</span>`;
            }

            function metric(title, value, detail, tone, icon) {
                return `
                    <div class="metric-card">
                        <div class="metric-icon ${tone}"><i class="fas ${icon}"></i></div>
                        <div class="metric-value">${value}</div>
                        <div class="metric-title">${title}</div>
                        <div class="metric-detail">${detail}</div>
                    </div>
                `;
            }

            function getRoomStudents(room) {
                return students.filter(s => s.room === room);
            }

            function getBedStatus(student) {
                if (!student) return 'vacant';
                if (student.status === 'Present') return 'present';
                if (student.status === 'Absent') return 'absent';
                if (student.status === 'Manual') return 'manual';
                return 'vacant';
            }

            // ---------- TOGGLE DROPDOWN ----------
            function toggleDropdown(element) {
                const content = element.nextElementSibling;
                const chevron = element.querySelector('.chevron');
                if (content.classList.contains('open')) {
                    content.classList.remove('open');
                    chevron.classList.remove('open');
                } else {
                    content.classList.add('open');
                    chevron.classList.add('open');
                }
            }

            // ---------- RENDER "MY HOSTEL" ----------
            function renderMyHostel() {
                const totalStudents = students.length;
                const present = students.filter(s => s.status === 'Present').length;
                const absent = students.filter(s => s.status === 'Absent').length;
                const capacity = hostelData?.capacity || 0;
                const occupied = students.length;
                const vacant = capacity - occupied;
                const totalRooms = hostelData?.total_rooms || 0;

                const roomStudents = selectedRoom ? getRoomStudents(selectedRoom) : [];
                const selectedStudentData = selectedStudent || roomStudents[0] || null;

                // QR Status
                const qrActive = sessionData !== null;
                const qrType = qrActive ? 'Semester' : '—';
                const qrExpiry = qrActive ? 'Dec 2026' : '—';

                // RA Coverage
                const totalRAs = staff.filter(s => s.role === 'RA' || s.role === 'Resident Advisor').length;
                const activeRAs = staff.filter(s => (s.role === 'RA' || s.role === 'Resident Advisor') && s.status === 'Active')
                    .length;
                const coverage = totalRAs > 0 ? Math.round((activeRAs / totalRAs) * 100) : 0;

                // Build hostel tree HTML with dropdowns
                let treeHtml = '';
                if (hostelStructure && hostelStructure.floors) {
                    treeHtml = hostelStructure.floors.map((floor, index) => {
                        const isOpen = index === 0;
                        return `
                            <div class="floor-dropdown">
                                <div class="dropdown-header" onclick="window.toggleDropdown(this)">
                                    <span><i class="fas ${hostelStructure.type === 'flat' ? 'fa-building' : 'fa-layer-group'}"></i> ${floor.name}</span>
                                    <span class="chevron ${isOpen ? 'open' : ''}"><i class="fas fa-chevron-down"></i></span>
                                </div>
                                <div class="dropdown-content ${isOpen ? 'open' : ''}">
                                    ${floor.rooms.map(room => `
                                        <div class="tree-item ${room === selectedRoom ? 'active' : ''}" onclick="window.selectRoom('${room}')">
                                            <i class="fas fa-door-open level-icon"></i> ${room}
                                            <span class="room-badge">${getRoomStudents(room).length}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    treeHtml = '<p class="text-muted text-sm">No hostel structure available</p>';
                }

                // Build occupancy map
                const floors = hostelStructure?.floors || [];
                const occupancyMapHtml = floors.slice(0, 5).map(floor => `
                    <div class="mt-2">
                        <span class="font-bold text-xs">${floor.name}</span>
                        <div class="occupancy-grid">
                            ${floor.rooms.slice(0, 10).map(room => {
                                const count = getRoomStudents(room).length;
                                const total = 4;
                                let cls = 'occ-dot';
                                if (count === total) cls += ' full';
                                else if (count === 0) cls += ' available';
                                else cls += ' maintenance';
                                return `<span class="${cls}" title="${room} (${count}/${total})"></span>`;
                            }).join('')}
                            ${floor.rooms.length > 10 ? `<span class="text-xs text-muted">+${floor.rooms.length - 10} more</span>` : ''}
                        </div>
                    </div>
                `).join('');

                // Level distribution
                const levels = [
                    { label: '100 Level', count: students.filter(s => s.level === '100' || s.level === 100).length || 42 },
                    { label: '200 Level', count: students.filter(s => s.level === '200' || s.level === 200).length || 53 },
                    { label: '300 Level', count: students.filter(s => s.level === '300' || s.level === 300).length || 48 },
                    { label: '400 Level', count: students.filter(s => s.level === '400' || s.level === 400).length || 39 },
                    { label: '500 Level', count: students.filter(s => s.level === '500' || s.level === 500).length || 34 }
                ];

                // Recent hostel activities
                const activities = [
                    { time: '08:10 AM', text: 'New student assigned to Room A04' },
                    { time: '09:15 AM', text: 'Student transferred to Room B11' },
                    { time: '10:30 AM', text: 'Room C07 marked under maintenance' },
                    { time: '12:40 PM', text: 'Student profile updated' }
                ];

                const html = `
                    <div class="page-heading">
                        <div>
                            <p class="eyebrow">🏢 ${hostelData?.name || 'My Hostel'}</p>
                            <h1>My Hostel</h1>
                            <p class="desc">${hostelData?.type || 'Boys Hostel'} · ${hostelData?.total_floors || 3} Floors · ${totalRooms} Rooms · ${capacity} Students</p>
                        </div>
                        <div class="badge-group">
                            <span class="qr-chip ${qrActive ? '' : 'inactive'}">
                                <span class="qr-dot ${qrActive ? 'active' : 'inactive'}"></span>
                                Hostel QR · ${qrType} ${qrActive ? `· Expires ${qrExpiry}` : ''}
                                <span class="badge ${qrActive ? 'badge-approved' : 'badge-draft'}" style="font-size:0.5rem;">${qrActive ? 'ACTIVE' : 'INACTIVE'}</span>
                            </span>
                            <span class="badge badge-approved" style="font-size:0.8rem;padding:0.4rem 1rem;">
                                RA Coverage · ${coverage}%
                            </span>
                        </div>
                    </div>

                    <!-- Overview Cards -->
                    <div class="metric-grid">
                        ${metric('Students', totalStudents, 'Registered', 'navy', 'fa-users')}
                        ${metric('Occupied', occupied, 'Beds filled', 'green', 'fa-bed')}
                        ${metric('Vacant', vacant, 'Available beds', 'gold', 'fa-chair')}
                        ${metric('Rooms', totalRooms, 'Total rooms', 'gray', 'fa-door-open')}
                    </div>

                    <!-- Hostel Information -->
                    <div class="card mt-6">
                        <div class="card-title">Hostel Information</div>
                        <div class="grid-3 mt-3">
                            <div><span class="text-muted">Hostel Name</span><br><span class="font-bold">${hostelData?.name || '—'}</span></div>
                            <div><span class="text-muted">Hostel Type</span><br><span class="font-bold">${hostelData?.type || 'Male Hostel'}</span></div>
                            <div><span class="text-muted">Floors</span><br><span class="font-bold">${hostelData?.total_floors || 3}</span></div>
                            <div><span class="text-muted">Rooms</span><br><span class="font-bold">${totalRooms}</span></div>
                            <div><span class="text-muted">Capacity</span><br><span class="font-bold">${capacity} Students</span></div>
                            <div><span class="text-muted">Resident Advisors</span><br><span class="font-bold">${totalRAs}</span></div>
                        </div>
                    </div>

                    <!-- Three-column layout: Explorer, Room Details, Student Info -->
                    <div class="grid-3 mt-6" style="grid-template-columns: 1fr 1.4fr 1.2fr;">
                        <!-- Hostel Explorer (with dropdowns) -->
                        <div class="hostel-tree">
                            <div class="font-bold text-sm mb-2"><i class="fas fa-sitemap"></i> ${hostelData?.name || 'Hostel'}</div>
                            ${treeHtml}
                        </div>

                        <!-- Room Details -->
                        <div class="room-detail-card">
                            <div class="flex-between">
                                <div class="font-bold text-lg">${selectedRoom || '—'}</div>
                                <span class="text-xs text-muted">${roomStudents.length} / 4 occupied</span>
                            </div>
                            <div class="mt-3">
                                ${['BS1', 'BS2', 'BS3', 'BS4'].map(bed => {
                                    const student = roomStudents.find(s => s.bed === bed);
                                    const status = getBedStatus(student);
                                    const statusLabels = {
                                        'present': '✅ Present',
                                        'absent': '❌ Absent',
                                        'manual': '🟡 Manual',
                                        'vacant': '⬜ Vacant'
                                    };
                                    const isActive = student && student.id === selectedStudentData?.id;
                                    return `
                                        <div class="bed-slot ${isActive ? 'active' : ''}" style="${isActive ? 'background:#e7edf5;border-radius:0.3rem;' : ''}" onclick="window.selectStudent('${student ? student.id : ''}')">
                                            <span class="bed-status ${status}"></span>
                                            <span style="font-weight:600;width:3rem;">${bed}</span>
                                            <span style="flex:1;">${student ? student.name : '—'}</span>
                                            <span style="font-size:0.7rem;">${statusLabels[status] || '—'}</span>
                                            ${student && student.fingerprint ? '<i class="fas fa-fingerprint" style="color:#2d6545;" title="Fingerprint Verified"></i>' : ''}
                                            ${student && student.status === 'Manual' ? '<i class="fas fa-pen" style="color:#d09b2e;" title="Manual Verification"></i>' : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            <div class="mt-3 text-xs text-muted" style="display:flex;gap:1rem;flex-wrap:wrap;">
                                <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;background:#2d6545;"></span> Present</span>
                                <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;background:#a84134;"></span> Absent</span>
                                <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;background:#d09b2e;"></span> Manual</span>
                                <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;background:#b9c7db;"></span> Vacant</span>
                            </div>
                        </div>

                        <!-- Student Information Panel -->
                        <div class="student-info-panel">
                            ${selectedStudentData ? `
                                <div class="font-bold text-lg">${selectedStudentData.name}</div>
                                <div class="mt-3">
                                    <div class="info-row"><span class="info-label">Matric Number</span><span class="info-value">${selectedStudentData.matric || '—'}</span></div>
                                    <div class="info-row"><span class="info-label">Room</span><span class="info-value">${selectedStudentData.room || '—'}</span></div>
                                    <div class="info-row"><span class="info-label">Bed Space</span><span class="info-value">${selectedStudentData.bed || '—'}</span></div>
                                    <div class="info-row"><span class="info-label">Level</span><span class="info-value">${selectedStudentData.level || '—'}</span></div>
                                    <div class="info-row"><span class="info-label">Status</span><span class="info-value">${attBadge(selectedStudentData.status)}</span></div>
                                    <div class="info-row"><span class="info-label">Verification</span><span class="info-value">${selectedStudentData.fingerprint ? '✅ Verified' : selectedStudentData.status === 'Manual' ? '🟡 Manual' : '❌ Not Verified'}</span></div>
                                    ${selectedStudentData.manualReason ? `<div class="info-row"><span class="info-label">Reason</span><span class="info-value" style="color:#d09b2e;">${selectedStudentData.manualReason}</span></div>` : ''}
                                    <div class="info-row"><span class="info-label">Verified By</span><span class="info-value">${selectedStudentData.verifiedBy || '—'}</span></div>
                                    <div class="info-row"><span class="info-label">Verified At</span><span class="info-value">${selectedStudentData.verifiedAt || '—'}</span></div>
                                </div>
                            ` : `
                                <div class="text-center text-muted" style="padding:2rem 0;">
                                    <i class="fas fa-user" style="font-size:2rem;color:#b9c7db;"></i>
                                    <p class="mt-2">Select a bed to view student details</p>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- Occupancy Map + Quick Statistics -->
                    <div class="grid-2 mt-6">
                        <!-- Occupancy Map -->
                        <div class="card">
                            <div class="card-title">🏠 Occupancy Map</div>
                            ${occupancyMapHtml || '<p class="text-muted text-sm">No occupancy data available</p>'}
                            <div class="flex gap-3 mt-3 text-xs">
                                <span><span class="occ-dot full" style="width:0.8rem;height:0.8rem;display:inline-block;"></span> Full</span>
                                <span><span class="occ-dot available" style="width:0.8rem;height:0.8rem;display:inline-block;"></span> Available</span>
                                <span><span class="occ-dot maintenance" style="width:0.8rem;height:0.8rem;display:inline-block;"></span> Maintenance</span>
                            </div>
                        </div>

                        <!-- Quick Statistics -->
                        <div class="card">
                            <div class="card-title">📊 Student Distribution by Level</div>
                            <div class="grid-2 mt-3">
                                ${levels.map(lvl => `
                                    <div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid #f0ebe2;">
                                        <span>${lvl.label}</span>
                                        <span class="font-bold">${lvl.count}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Recent Activities -->
                    <div class="card mt-6">
                        <div class="card-title">📋 Recent Hostel Activities</div>
                        <div class="mt-3">
                            ${activities.map(act => `
                                <div class="activity-item">
                                    <span class="text-xs text-muted" style="width:4rem;">${act.time}</span>
                                    <span>${act.text}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="mt-6 pt-4 border-t text-center">
                        <p class="text-xs text-muted">
                            BIU BedCheck System v1.0 · © Benson Idahosa University
                            <span class="ml-4"><span class="status-dot green"></span> System Online</span>
                        </p>
                    </div>
                `;

                screenContent.innerHTML = html;

                // Rebind globals after rendering
                window.selectRoom = selectRoom;
                window.selectStudent = selectStudent;
                window.showToast = showToast;
                window.toggleDropdown = toggleDropdown;
            }

            // ---------- INTERACTIONS ----------
            function selectRoom(room) {
                selectedRoom = room;
                const roomStudents = getRoomStudents(room);
                selectedStudent = roomStudents[0] || null;
                renderMyHostel();
                showToast(`Selected Room ${room}`, 'success');
            }

            function selectStudent(studentId) {
                if (!studentId) {
                    showToast('No student assigned to this bed', 'error');
                    return;
                }
                const student = students.find(s => s.id == studentId);
                if (student) {
                    selectedStudent = student;
                    renderMyHostel();
                    showToast(`Selected ${student.name}`, 'success');
                }
            }

            // ---------- LOGOUT ----------
            function handleLogout() {
                sessionStorage.removeItem('bedcheck_user');
                localStorage.removeItem('bedcheck_user');
                showToast('Logging out...', 'success');
                setTimeout(() => window.location.replace('../Login.html'), 500);
            }

            // ---------- INIT ----------
            function init() {
                const userData = sessionStorage.getItem('bedcheck_user') || localStorage.getItem('bedcheck_user');

                if (!userData) {
                    window.location.replace('../Login.html');
                    return;
                }

                try {
                    currentUser = JSON.parse(userData);
                    if (!sessionStorage.getItem('bedcheck_user')) {
                        sessionStorage.setItem('bedcheck_user', userData);
                    }

                    if (!currentUser.id) {
                        showToast('User data incomplete. Please login again.', 'error');
                        setTimeout(() => window.location.replace('../Login.html'), 2000);
                        return;
                    }

                    updateUserDisplay();
                    loadAllData();
                } catch (e) {
                    console.error('Error parsing user data:', e);
                    window.location.replace('../Login.html');
                }

                logoutBtn.addEventListener('click', handleLogout);
                menuToggle.addEventListener('click', () => {
                    showToast('Sidebar toggle (responsive view)', 'success');
                });
            }

            window.showToast = showToast;
            window.selectRoom = selectRoom;
            window.selectStudent = selectStudent;
            window.toggleDropdown = toggleDropdown;

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

</body>
</html>
