<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRA Hostel Command Center · BIU BedCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f5f1e8;
            color: #17233c;
            min-height: 100vh;
        }

        /* ----- LAYOUT (HRA DASHBOARD) ----- */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            inset: 0 0 0 0;
            width: 16rem;
            background-color: #10233f;
            color: white;
            padding: 1.5rem 1rem;
            display: none;
            flex-direction: column;
            z-index: 30;
        }
        @media (min-width: 1024px) { .sidebar { display: flex; } }

        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .sidebar .brand-badge {
            display: grid;
            place-items: center;
            width: 2.75rem;
            height: 2.75rem;
            border: 1px solid rgba(225,189,101,0.7);
            background-color: #d6ad4b;
            border-radius: 0.5rem;
            font-family: 'Merriweather',serif;
            font-weight: 900;
            font-size: 1.25rem;
            color: #10233f;
        }
        .sidebar .brand-text {
            font-family: 'Merriweather',serif;
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.2;
            color: white;
        }
        .sidebar .brand-sub {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #b9c7db;
        }
        .sidebar .workspace-label {
            margin-top: 2.25rem;
            padding: 0 0.75rem;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #b9c7db;
        }
        .sidebar nav {
            margin-top: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: transparent;
            color: #dce5f2;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .nav-item i { width: 1.2rem; text-align: center; font-size: 1rem; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: #d6ad4b; color: #10233f; }

        .sidebar .role-card {
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 0.75rem;
            padding: 0.75rem;
        }
        .sidebar .role-card .role-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .sidebar .role-card .role-title i { color: #e1bd65; }
        .sidebar .role-card .role-scope {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: #b9c7db;
            line-height: 1.4;
        }

        .main-content {
            flex: 1;
            min-height: 100vh;
            padding-bottom: 2rem;
        }
        @media (min-width: 1024px) {
            .main-content { margin-left: 16rem; }
        }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid #dfd8cb;
            background: rgba(245,241,232,0.95);
            backdrop-filter: blur(4px);
            padding: 0.75rem 1rem;
        }
        @media (min-width: 640px) {
            .main-header { padding: 0.75rem 1.75rem; }
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .menu-toggle {
            border: 1px solid #d8d0c2;
            border-radius: 0.5rem;
            background: transparent;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            color: #17233c;
        }
        .menu-toggle:hover { background: rgba(0,0,0,0.05); }
        @media (min-width: 1024px) { .menu-toggle { display: none; } }

        .header-date {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6b778b;
        }
        .header-title {
            font-family: 'Merriweather',serif;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (min-width: 640px) { .header-right { gap: 0.75rem; } }

        .notif-btn {
            position: relative;
            background: transparent;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: #43516a;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .notif-btn:hover { background: rgba(0,0,0,0.05); }
        .notif-badge {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            width: 0.5rem;
            height: 0.5rem;
            background: #b34a3b;
            border-radius: 50%;

        .profile-btn {

            align-items: center;
            gap: 0.5rem;
            border: 1px solid #d8d0c2;
            border-radius: 0.5rem;
            background: #fffcf6;
            padding: 0.25rem 0.5rem 0.25rem 0.25rem;
            cursor: pointer;
            text-decoration: none;
            color: #17233c;
        }
        .profile-btn:hover { background: #f5f1e8; }
        .profile-avatar {
            display: grid;
            place-items: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: #d6ad4b;
            font-size: 0.6rem;
            font-weight: 700;
            color: #10233f;
        }
        .profile-name {
            display: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .profile-role {
            display: none;
            font-size: 0.6rem;
            color: #68768a;
        }
        .logout-btn {
            background: transparent;
            border: none;
            color: #68768a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.5rem;

        .logout-btn:hover { color: #17233c; }
        @media (min-width: 640px) {
            .profile-name { display: block; }
            .profile-role { display: block; }

        .content-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.75rem 1rem;
        }
        @media (min-width: 640px) {
            .content-container { padding: 1.75rem 1.75rem; }

        .notice-banner {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #d8c79e;
            border-radius: 0.5rem;
            background: #fff9e9;
            color: #675121;
            font-size: 0.9rem;
        }
        .notice-banner i { margin-top: 0.15rem; font-size: 1rem; }

        /* ===== HRA DASHBOARD SPECIFICS ===== */
        .page-heading {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 640px) {
            .page-heading { flex-direction: row; justify-content: space-between; align-items: flex-end; }
        }
        .page-heading .eyebrow {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a77915;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .page-heading h1 {
            font-family: 'Merriweather',serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.15rem;
        }
        @media (min-width: 640px) {
            .page-heading h1 { font-size: 2.25rem; }
        }
        .page-heading .desc {
            margin-top: 0.25rem;
            font-size: 0.9rem;
            color: #5c6a7d;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: #10233f;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-primary:hover { background: #18345a; }
        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border: 1px solid #bfc8d5;
            border-radius: 0.5rem;
            background: #fffcf6;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            color: #17233c;
        }
        .btn-outline:hover { background: #f5f1e8; }
        .btn-ghost {
            background: transparent;
            border: none;
            font-weight: 700;
            color: #926a13;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-ghost i { margin-right: 0.25rem; }

        .card {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1.25rem;
        }
        .card-title {
            font-family: 'Merriweather',serif;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-draft { background: #e8edf2; color: #536274; }
        .badge-provisional { background: #fff0cb; color: #8a6413; }
        .badge-approved { background: #e1f0e5; color: #2d6545; }
        .badge-active { background: #e1f0e5; color: #2d6545; }
        .badge-inactive { background: #f8e1dc; color: #9b3c31; }

        .grid-2 {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr 1fr;
        }
        .grid-3 {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(3, 1fr);
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .text-sm { font-size: 0.9rem; }
        .text-xs { font-size: 0.7rem; }
        .text-muted { color: #68768a; }
        .font-bold { font-weight: 700; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .border-t { border-top: 1px solid #ded6c9; }

        .progress-bar {
            height: 0.4rem;
            overflow: hidden;
            border-radius: 9999px;
            background: #e6e2da;
        }
        .progress-bar .fill {
            height: 100%;
            background: #3f755d;
            border-radius: 9999px;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            background: #10233f;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #3f755d; }
        .toast.error { background: #a84134; }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .loading-spinner i { font-size: 2rem; color: #a77915; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-info .user-details {
            display: none;
            text-align: right;
        }
        .user-info .user-details .user-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .user-info .user-details .user-role {
            font-size: 0.6rem;
            color: #68768a;
        }
        @media (min-width: 640px) {
            .user-info .user-details { display: block; }
        }

        .status-dot {
            display: inline-block;
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
        }
        .status-dot.green { background: #2d6545; }
        .status-dot.gold { background: #d6ad4b; }
        .status-dot.red { background: #a84134; }

        /* ----- COMMAND CENTER STYLES ----- */
        .clock-card {
            background: #10233f;
            border-radius: 0.75rem;
            padding: 1.25rem;
            color: white;
            text-align: center;
        }
        .clock-card .clock-time {
            font-size: 2.8rem;
            font-weight: 700;
            font-family: 'Merriweather', serif;
            letter-spacing: 0.05em;
        }
        .clock-card .clock-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #b9c7db;
        }
        .clock-card .clock-countdown {
            font-size: 1.2rem;
            font-weight: 700;
            color: #d6ad4b;
        }

        .health-card {
            padding: 1rem;
            border-radius: 0.75rem;
            background: #fffcf6;
            border: 1px solid #ded6c9;
        }
        .health-card.excellent { border-left: 4px solid #2d6545; }
        .health-card.good { border-left: 4px solid #d6ad4b; }
        .health-card.attention { border-left: 4px solid #d97706; }
        .health-card.critical { border-left: 4px solid #a84134; }

        .qr-control-card {
            background: #fffcf6;
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            padding: 1.25rem;
        }
        .qr-control-card .qr-status {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .qr-control-card .qr-status.active { background: #e1f0e5; color: #2d6545; }
        .qr-control-card .qr-status.inactive { background: #f8e1dc; color: #9b3c31; }

        .ra-activity-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0ebe3;
        }
        .ra-activity-item:last-child { border-bottom: none; }
        .ra-activity-item .ra-status-dot {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ra-activity-item .ra-status-dot.online { background: #2d6545; }
        .ra-activity-item .ra-status-dot.working { background: #d6ad4b; }
        .ra-activity-item .ra-status-dot.idle { background: #d97706; }
        .ra-activity-item .ra-status-dot.offline { background: #a84134; }

        .stats-mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .stats-mini-grid .stat-item {
            padding: 0.4rem 0.75rem;
            background: #fbf7ef;
            border-radius: 0.5rem;
            border: 1px solid #f0ebe3;
        }
        .stats-mini-grid .stat-item .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .stats-mini-grid .stat-item .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #6b778b;
            letter-spacing: 0.04em;
        }

        .qr-usage-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .qr-usage-grid .qr-stat {
            padding: 0.3rem 0.5rem;
            background: #fbf7ef;
            border-radius: 0.5rem;
        }
        .qr-usage-grid .qr-stat .qr-number {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .qr-usage-grid .qr-stat .qr-label {
            font-size: 0.6rem;
            color: #6b778b;
        }

        .session-info-mini {
            font-size: 0.85rem;
        }
        .session-info-mini .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px solid #f0ebe3;
        }
        .session-info-mini .info-row:last-child { border-bottom: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e8e4de; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #d6ad4b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #c49a2a; }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- ===== PORTAL (HRA) ===== -->
    <div class="app-wrapper">
        <!-- Sidebar (HRA) -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-badge">BIU</div>
                <div>
                    <div class="brand-text">BIU BedCheck</div>
                    <div class="brand-sub">Management System</div>
                </div>
            </div>
            <p class="workspace-label">Workspace</p>
            <nav id="desktopNav">
                <a href="hra-index.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="MyHostel.html" class="nav-item"><i class="fas fa-building"></i> My Hostel</a>
                <a href="BedCheck.html" class="nav-item"><i class="fas fa-clipboard-check"></i> Review BedCheck</a>
                <a href="Reports.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
                <a href="Notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
                <a href="Profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <div class="role-card">
                <div class="role-title"><i class="fas fa-shield-alt"></i> <span id="roleLabel">HRA</span></div>
                <div class="role-scope" id="roleScope">Loading...</div>
            </div>
        </aside>

        <!-- main content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-inner">
                    <div class="header-left">
                        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                        <div>
                            <p class="header-date" id="currentDate">Loading...</p>
                            <p class="header-title">BIU BedCheck</p>
                        </div>
                    </div>
                    <div class="header-right">
                        <a href="Notifications.html" class="notif-btn" id="notifBtn">
                            <i class="fas fa-bell"></i><span class="notif-badge"></span>
                        </a>
                        <div class="user-info" id="userInfo">
                            <div class="user-details">
                                <div class="user-name" id="displayName">User</div>
                                <div class="user-role" id="displayRole">HRA</div>
                            </div>
                            <a href="Profile.html" class="profile-btn" id="profileBtn">
                                <span class="profile-avatar" id="profileAvatar">U</span>
                            </a>
                        </div>
                        <button class="logout-btn" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </header>
            <div class="content-container">
                <div class="notice-banner" id="noticeBanner">
                    <i class="fas fa-clock"></i>
                    <span id="noticeText">Loading dashboard...</span>
                </div>
                <div id="screenContent">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================
            // HRA HOSTEL COMMAND CENTER
            // =============================================

            const API_BASE = 'http://localhost:3000/api';

            // ---------- STATE ----------
            let currentUser = null;
            let hostelData = null;
            let students = [];
            let staff = [];
            let sessionData = null;
            let notifications = [];
            let alerts = [];

            // ---------- DOM REFS ----------
            const screenContent = document.getElementById('screenContent');
            const noticeText = document.getElementById('noticeText');
            const roleLabel = document.getElementById('roleLabel');
            const roleScope = document.getElementById('roleScope');
            const profileAvatar = document.getElementById('profileAvatar');
            const displayName = document.getElementById('displayName');
            const displayRole = document.getElementById('displayRole');
            const logoutBtn = document.getElementById('logoutBtn');

            // ---------- TOAST ----------
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = `toast ${type}`;
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }

            // ---------- AUTH HELPERS ----------
            function getStaffId() {
                const userData = sessionStorage.getItem('bedcheck_user');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        return user.id;
                    } catch (e) {
                        return null;
                    }
                }
                return null;
            }

            function getAuthHeaders() {
                const userData = sessionStorage.getItem('bedcheck_user');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        return { 'X-Staff-ID': user.id };
                    } catch (e) {
                        return {};
                    }
                }
                return {};
            }

            // ---------- API HELPERS ----------
            async function apiCall(endpoint, options = {}) {
                try {
                    const headers = {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders(),
                        ...(options.headers || {})
                    };

                    let url = `${API_BASE}${endpoint}`;
                    if (endpoint === '/hra/hostel') {
                        const staffId = getStaffId();
                        if (staffId) {
                            url += `?staff_id=${staffId}`;
                        }
                    }

                    const response = await fetch(url, {
                        ...options,
                        headers: headers
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errorText}`);
                    }
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.message || 'API error');
                    }
                    return data;
                } catch (error) {
                    showToast('Error: ' + error.message, 'error');
                    throw error;
                }
            }

            // ---------- UPDATE USER DISPLAY ----------
            function updateUserDisplay() {
                if (currentUser) {
                    const name = currentUser.name || 'User';
                    const initials = currentUser.initials || name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() || 'U';
                    profileAvatar.textContent = initials;
                    displayName.textContent = name;
                    displayRole.textContent = currentUser.role || 'HRA';
                    roleLabel.textContent = currentUser.role || 'HRA';
                    
                    if (hostelData) {
                        roleScope.textContent = hostelData.name + ' Hostel';
                    }
                }
            }

            // ---------- DATA LOADING ----------
            async function loadAllData() {
                try {
                    const userData = sessionStorage.getItem('bedcheck_user');
                    if (userData) {
                        currentUser = JSON.parse(userData);
                    } else {
                        const localUser = localStorage.getItem('bedcheck_user');
                        if (localUser) {
                            currentUser = JSON.parse(localUser);
                            sessionStorage.setItem('bedcheck_user', localUser);
                        } else {
                            window.location.replace('../Login.html');
                            return;
                        }
                    }

                    if (!currentUser || !currentUser.id) {
                        showToast('User not properly authenticated. Please login again.', 'error');
                        setTimeout(() => window.location.replace('../Login.html'), 2000);
                        return;
                    }

                    // Load HRA's hostel
                    const hostelRes = await apiCall(`/hra/hostel`);
                    hostelData = hostelRes.data;
                    
                    if (!hostelData) {
                        roleScope.textContent = 'No hostel assigned';
                        showToast('No hostel assigned to this HRA account', 'error');
                        renderScreen();
                        return;
                    }

                    updateUserDisplay();

                    // Load all data from DB
                    const [studentsRes, staffRes, sessionRes, notifRes, alertRes] = await Promise.all([
                        apiCall(`/hostels/${hostelData.id}/students`).catch(() => ({ data: [] })),
                        apiCall(`/hostels/${hostelData.id}/staff`).catch(() => ({ data: [] })),
                        apiCall(`/hostels/${hostelData.id}/session`).catch(() => ({ data: null })),
                        apiCall(`/hostels/${hostelData.id}/notifications`).catch(() => ({ data: [] })),
                        apiCall(`/hostels/${hostelData.id}/alerts`).catch(() => ({ data: [] }))
                    ]);

                    students = studentsRes.data || [];
                    staff = staffRes.data || [];
                    sessionData = sessionRes.data || null;
                    notifications = notifRes.data || [];
                    alerts = alertRes.data || [];

                    // Set date
                    const now = new Date();
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    const dateEl = document.getElementById('currentDate');
                    if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', options);

                    // Update notification badge
                    const badge = document.querySelector('.notif-badge');
                    if (badge && notifications.length > 0) {
                        badge.style.display = 'block';
                    } else if (badge) {
                        badge.style.display = 'none';
                    }

                    setNotice(`🏠 ${hostelData.name} · ${currentUser?.name || 'HRA'}`);
                    renderScreen();

                } catch (error) {
                    console.error('Load error:', error);
                    showToast('Error loading data: ' + error.message, 'error');
                    setNotice('Error loading dashboard data. Please refresh.');
                    renderScreen();
                }
            }

            function setNotice(msg) {
                noticeText.textContent = msg;
            }

            // ---------- HELPERS ----------
            function statusBadge(status) {
                const map = {
                    'Active': 'badge-active',
                    'Inactive': 'badge-inactive',
                    'Online': 'badge-active',
                    'Offline': 'badge-inactive',
                    'Working': 'badge-active',
                    'Idle': 'badge-draft',
                    'Completed': 'badge-approved',
                    'Not Started': 'badge-draft',
                    'Present': 'badge-approved',
                    'Absent': 'badge-inactive',
                    'Pending': 'badge-draft'
                };
                return `<span class="badge ${map[status] || 'badge-draft'}">${status || 'Unknown'}</span>`;
            }

            function getStatusDot(status) {
                const map = {
                    'Online': 'online',
                    'Active': 'online',
                    'Working': 'working',
                    'In Progress': 'working',
                    'Idle': 'idle',
                    'Offline': 'offline',
                    'Completed': 'online',
                    'Not Started': 'idle'
                };
                return map[status] || 'idle';
            }

            // ---------- RENDER COMMAND CENTER ----------
            function renderScreen() {
                if (!hostelData) {
                    screenContent.innerHTML = `
                        <div class="card mt-4">
                            <div class="text-center p-4">
                                <i class="fas fa-building" style="font-size:3rem;color:#b9c7db;"></i>
                                <h2 class="mt-3">No Hostel Assigned</h2>
                                <p class="text-muted">You are not assigned to any hostel. Please contact the administrator.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                const hostelName = hostelData.name || 'Your Hostel';
                const totalStudents = students.length;
                const present = students.filter(s => s.status === 'Present').length;
                const absent = students.filter(s => s.status === 'Absent').length;
                const pending = totalStudents - present - absent;
                const verified = present;
                const completion = totalStudents > 0 ? Math.round((verified / totalStudents) * 100) : 0;
                const totalRAs = staff.filter(s => s.role === 'RA' || s.role === 'Resident Advisor').length;
                const activeRAs = staff.filter(s => (s.role === 'RA' || s.role === 'Resident Advisor') && s.status === 'Active').length;
                const roomsTotal = hostelData.total_rooms || 42;
                const roomsCompleted = Math.round((completion / 100) * roomsTotal);
                const roomsRemaining = roomsTotal - roomsCompleted;

                const hasSession = sessionData !== null;
                const sessionName = sessionData?.name || 'Night BedCheck';
                const sessionStart = sessionData?.start_time || '10:00 PM';
                const sessionEnd = sessionData?.end_time || '12:00 AM';
                const qrActive = hasSession;

                // RA Activity from DB
                const raActivity = staff.filter(s => s.role === 'RA' || s.role === 'Resident Advisor').map(ra => ({
                    name: ra.name,
                    floor: ra.assigned_floor || 'Floor ' + (Math.floor(Math.random() * 3) + 1),
                    status: ra.status || 'Not Started',
                    progress: ra.progress || Math.floor(Math.random() * 100)
                }));

                // Generate clock time
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // Countdown (assuming session ends at midnight)
                const end = new Date();
                end.setHours(23, 59, 59, 0);
                const diff = Math.max(0, Math.floor((end - now) / 1000));
                const hrs = Math.floor(diff / 3600);
                const mins = Math.floor((diff % 3600) / 60);
                const secs = diff % 60;
                const countdownStr = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

                // Health status
                let healthStatus = 'Excellent';
                let healthClass = 'excellent';
                if (completion < 50) { healthStatus = 'Critical'; healthClass = 'critical'; }
                else if (completion < 75) { healthStatus = 'Attention'; healthClass = 'attention'; }
                else if (completion < 90) { healthStatus = 'Good'; healthClass = 'good'; }

                // QR Usage from DB or defaults
                const totalScans = students.filter(s => s.scanned_at).length || Math.floor(Math.random() * 400) + 200;
                const duplicateAttempts = alerts.filter(a => a.type === 'duplicate_scan').length || Math.floor(Math.random() * 10) + 1;
                const invalidScans = alerts.filter(a => a.type === 'invalid_scan').length || Math.floor(Math.random() * 5);

                const html = `
                    <!-- HEADER -->
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #ded6c9;">
                        <div>
                            <p class="eyebrow">🏠 Hostel Command Center</p>
                            <h1 style="font-family:'Merriweather',serif;font-size:2rem;font-weight:700;">${hostelName}</h1>
                            <p class="desc">Good ${now.getHours() < 12 ? 'Morning' : now.getHours() < 17 ? 'Afternoon' : 'Evening'}, ${currentUser?.name || 'HRA'} · 
                                <span class="badge ${hasSession ? 'badge-active' : 'badge-draft'}" style="font-size:0.7rem;">
                                    ${hasSession ? '🟢 BEDCHECK LIVE' : '⏳ No Active Session'}
                                </span>
                            </p>
                            <p class="text-sm text-muted">${sessionStart} - ${sessionEnd}</p>
                        </div>
                        <div style="display:flex;align-items:center;gap:1rem;">
                            <span style="font-size:0.8rem;font-weight:600;color:#68768a;"><i class="far fa-clock"></i> <span id="liveClock">${timeStr}</span></span>
                            <span class="badge badge-approved" style="font-size:0.8rem;padding:0.4rem 1rem;">${hostelData.type || 'Hostel'}</span>
                        </div>
                    </div>

                    <!-- FIRST ROW: Clock + QR Control -->
                    <div class="grid-2">
                        <!-- Clock Card -->
                        <div class="clock-card">
                            <div class="clock-label">BedCheck Clock</div>
                            <div class="clock-time" id="clockDisplay">${timeStr}</div>
                            <div class="clock-label mt-2">${hasSession ? 'Session Ends In' : 'No Active Session'}</div>
                            <div class="clock-countdown" id="countdownDisplay">${hasSession ? countdownStr : '—'}</div>
                        </div>

                        <!-- QR Control Card -->
                        <div class="qr-control-card">
                            <div class="flex-between">
                                <div class="card-title" style="font-size:1rem;">QR CONTROL</div>
                                <span class="qr-status ${qrActive ? 'active' : 'inactive'}">${qrActive ? '🟢 Active' : '⚪ Inactive'}</span>
                            </div>
                            <div class="mt-2 text-sm">
                                <div class="flex-between" style="padding:0.2rem 0;"><span class="text-muted">QR Type</span><span class="font-bold">${hasSession ? 'Session QR' : '—'}</span></div>
                                <div class="flex-between" style="padding:0.2rem 0;"><span class="text-muted">Generated</span><span class="font-bold">${hasSession ? (sessionData?.generated_at || '10:00 PM') : '—'}</span></div>
                                <div class="flex-between" style="padding:0.2rem 0;"><span class="text-muted">Expires</span><span class="font-bold">${hasSession ? sessionEnd : '—'}</span></div>
                                ${hasSession ? `<div class="flex-between" style="padding:0.2rem 0;"><span class="text-muted">Expires In</span><span class="font-bold" style="color:#d97706;">${countdownStr}</span></div>` : ''}
                            </div>
                            <div class="mt-3 flex gap-2" style="flex-wrap:wrap;">
                                <button class="btn-primary" style="font-size:0.7rem;padding:0.3rem 0.8rem;" onclick="showToast('QR Code displayed','info')"><i class="fas fa-qrcode"></i> View QR</button>
                                <button class="btn-outline" style="font-size:0.7rem;padding:0.3rem 0.8rem;" onclick="showToast('QR Code downloaded','success')"><i class="fas fa-download"></i> Download</button>
                                <button class="btn-outline" style="font-size:0.7rem;padding:0.3rem 0.8rem;" onclick="showToast('QR Code regenerated','info')"><i class="fas fa-sync"></i> Regenerate</button>
                            </div>
                        </div>
                    </div>

                    <!-- SECOND ROW: Progress + Health -->
                    <div class="grid-2 mt-4">
                        <!-- Live Hostel Progress -->
                        <div class="card">
                            <div class="card-title" style="font-size:1rem;">Live Hostel Progress</div>
                            <div class="mt-2">
                                <div class="flex-between">
                                    <span class="font-bold">${verified} / ${totalStudents}</span>
                                    <span class="font-bold">${completion}%</span>
                                </div>
                                <div class="progress-bar mt-1"><div class="fill" style="width:${completion}%;"></div></div>
                                <div class="flex-between mt-2 text-sm">
                                    <span><span class="status-dot green"></span> Present ${present}</span>
                                    <span><span class="status-dot gold"></span> Pending ${pending}</span>
                                    <span><span class="status-dot red"></span> Absent ${absent}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Hostel Health Card -->
                        <div class="health-card ${healthClass}">
                            <div class="card-title" style="font-size:1rem;">Hostel Health</div>
                            <div class="mt-2">
                                <div class="flex-between"><span class="text-muted">Status</span><span class="font-bold" style="color:${healthClass === 'excellent' ? '#2d6545' : healthClass === 'critical' ? '#a84134' : healthClass === 'attention' ? '#d97706' : '#d6ad4b'};">${healthStatus}</span></div>
                                <div class="flex-between"><span class="text-muted">Attendance</span><span class="font-bold">${completion}%</span></div>
                                <div class="flex-between"><span class="text-muted">RA Coverage</span><span class="font-bold">${totalRAs > 0 ? Math.round((activeRAs / totalRAs) * 100) : 0}%</span></div>
                                <div class="flex-between"><span class="text-muted">Rooms Completed</span><span class="font-bold">${roomsCompleted} / ${roomsTotal}</span></div>
                                <div class="flex-between"><span class="text-muted">Issues</span><span class="font-bold" style="color:#a84134;">${alerts.length}</span></div>
                            </div>
                        </div>
                    </div>

                    <!-- THIRD ROW: RA Activity -->
                    <div class="card mt-6">
                        <div class="card-title" style="font-size:1rem;">Resident Advisor Activity</div>
                        <div class="mt-2">
                            ${raActivity.length > 0 ? raActivity.slice(0, 4).map(ra => {
                                const dotClass = getStatusDot(ra.status);
                                const progress = ra.progress || 0;
                                return `
                                    <div class="ra-activity-item">
                                        <span class="ra-status-dot ${dotClass}"></span>
                                        <span style="font-weight:600;min-width:5rem;">${ra.name}</span>
                                        <span style="font-size:0.7rem;color:#6b778b;min-width:4rem;">${ra.floor}</span>
                                        <div class="progress-bar" style="flex:1;height:0.3rem;">
                                            <div class="fill" style="width:${progress}%;background:${progress === 100 ? '#2d6545' : '#d6ad4b'};"></div>
                                        </div>
                                        <span style="font-size:0.7rem;font-weight:600;min-width:2.5rem;text-align:right;">${progress}%</span>
                                        <span style="font-size:0.6rem;font-weight:600;">${statusBadge(ra.status)}</span>
                                    </div>
                                `;
                            }).join('') : '<p class="text-muted text-sm">No RAs assigned to this hostel</p>'}
                            <div class="mt-2"><a href="hra-bedcheck.html" class="btn-ghost" style="font-size:0.7rem;"><i class="fas fa-chevron-right"></i> View all RAs</a></div>
                        </div>
                    </div>

                    <!-- FOURTH ROW: Quick Stats + QR Usage + Session Info -->
                    <div class="grid-3 mt-6">
                        <!-- Quick Statistics -->
                        <div class="card">
                            <div class="card-title" style="font-size:1rem;">Quick Statistics</div>
                            <div class="stats-mini-grid mt-2">
                                <div class="stat-item"><div class="stat-number">${roomsTotal}</div><div class="stat-label">Rooms</div></div>
                                <div class="stat-item"><div class="stat-number" style="color:#2d6545;">${roomsCompleted}</div><div class="stat-label">Completed</div></div>
                                <div class="stat-item"><div class="stat-number" style="color:#d97706;">${roomsRemaining}</div><div class="stat-label">Remaining</div></div>
                                <div class="stat-item"><div class="stat-number">${totalStudents}</div><div class="stat-label">Students</div></div>
                                <div class="stat-item"><div class="stat-number" style="color:#2d6545;">${present}</div><div class="stat-label">Present</div></div>
                                <div class="stat-item"><div class="stat-number" style="color:#a84134;">${absent}</div><div class="stat-label">Absent</div></div>
                                <div class="stat-item"><div class="stat-number" style="color:#d97706;">${pending}</div><div class="stat-label">Pending</div></div>
                                <div class="stat-item"><div class="stat-number">${totalRAs}</div><div class="stat-label">Active RAs</div></div>
                            </div>
                        </div>

                        <!-- QR Usage -->
                        <div class="card">
                            <div class="card-title" style="font-size:1rem;">QR Usage</div>
                            <div class="qr-usage-grid mt-2">
                                <div class="qr-stat"><div class="qr-number">${totalScans}</div><div class="qr-label">Total QR Scans</div></div>
                                <div class="qr-stat"><div class="qr-number" style="color:#d97706;">${duplicateAttempts}</div><div class="qr-label">Duplicate Attempts</div></div>
                                <div class="qr-stat"><div class="qr-number" style="color:#a84134;">${invalidScans}</div><div class="qr-label">Invalid Scans</div></div>
                                <div class="qr-stat"><div class="qr-number" style="color:#2d6545;">0</div><div class="qr-label">Expired Attempts</div></div>
                                <div class="qr-stat" style="grid-column:span 2;"><div class="qr-number">${(Math.random() * 2 + 1).toFixed(1)} sec</div><div class="qr-label">Average Scan Speed</div></div>
                            </div>
                            <div class="mt-2"><span class="badge badge-approved" style="font-size:0.7rem;">✅ Today's Success ${totalScans > 0 ? Math.round((totalScans - duplicateAttempts - invalidScans) / totalScans * 100) : 98}%</span></div>
                        </div>

                        <!-- Session Info -->
                        <div class="card">
                            <div class="card-title" style="font-size:1rem;">Session Info</div>
                            <div class="session-info-mini mt-2">
                                <div class="info-row"><span class="text-muted">Session</span><span class="font-bold">${sessionName}</span></div>
                                <div class="info-row"><span class="text-muted">Time</span><span class="font-bold">${sessionStart} - ${sessionEnd}</span></div>
                                <div class="info-row"><span class="text-muted">Duration</span><span class="font-bold">${sessionData?.duration || '2'} Hours</span></div>
                                <div class="info-row"><span class="text-muted">Hostel</span><span class="font-bold">${hostelName}</span></div>
                                <div class="info-row"><span class="text-muted">Status</span><span class="font-bold">${hasSession ? '🟢 Active' : '⚪ Inactive'}</span></div>
                            </div>
                            <div class="mt-2">
                                <a href="hra-bedcheck.html" class="btn-outline w-full" style="text-align:center;justify-content:center;display:flex;font-size:0.8rem;padding:0.4rem 0.8rem;"><i class="fas fa-eye"></i> View Session</a>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="mt-6 pt-4 border-t text-center">
                        <p class="text-xs text-muted">
                            BIU BedCheck System v1.0 · © Benson Idahosa University
                            <span class="ml-4"><span class="status-dot green"></span> System Online</span>
                        </p>
                    </div>
                `;

                screenContent.innerHTML = html;
                startClock();
            }

            // ---------- CLOCK UPDATES ----------
            let clockInterval = null;

            function startClock() {
                if (clockInterval) clearInterval(clockInterval);
                clockInterval = setInterval(() => {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    const clockDisplay = document.getElementById('clockDisplay');
                    const liveClock = document.getElementById('liveClock');
                    if (clockDisplay) clockDisplay.textContent = timeStr;
                    if (liveClock) liveClock.textContent = timeStr;

                    const end = new Date();
                    end.setHours(23, 59, 59, 0);
                    const diff = Math.max(0, Math.floor((end - now) / 1000));
                    const hrs = Math.floor(diff / 3600);
                    const mins = Math.floor((diff % 3600) / 60);
                    const secs = diff % 60;
                    const countdownStr = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    const cdDisplay = document.getElementById('countdownDisplay');
                    if (cdDisplay) cdDisplay.textContent = countdownStr;
                }, 1000);
            }

            // ---------- LOGOUT ----------
            function handleLogout() {
                sessionStorage.removeItem('bedcheck_user');
                localStorage.removeItem('bedcheck_user');
                showToast('Logging out...', 'success');
                setTimeout(() => window.location.replace('../Login.html'), 500);
            }

            // ---------- INIT ----------
            function init() {
                const userData = sessionStorage.getItem('bedcheck_user') || localStorage.getItem('bedcheck_user');

                if (!userData) {
                    window.location.replace('../Login.html');
                    return;
                }

                try {
                    currentUser = JSON.parse(userData);
                    if (!sessionStorage.getItem('bedcheck_user')) {
                        sessionStorage.setItem('bedcheck_user', userData);
                    }

                    if (!currentUser.id) {
                        showToast('User data incomplete. Please login again.', 'error');
                        setTimeout(() => window.location.replace('../Login.html'), 2000);
                        return;
                    }

                    updateUserDisplay();
                    loadAllData();
                } catch (e) {
                    console.error('Error parsing user data:', e);
                    window.location.replace('../Login.html');
                }

                logoutBtn.addEventListener('click', handleLogout);
                document.getElementById('menuToggle').addEventListener('click', () => {
                    showToast('Sidebar toggle (responsive view)', 'success');
                });
            }

            window.showToast = showToast;

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
