<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration · BIU BedCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8e0d5 100%);
            color: #17233c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .register-container {
            max-width: 950px;
            width: 100%;
            background: #fffcf6;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #d6ad4b, #10233f, #d6ad4b);
        }

        .register-header {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eee8de;
            margin-bottom: 1.5rem;
        }
        .register-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .register-header .logo .logo-badge {
            display: grid;
            place-items: center;
            width: 3rem;
            height: 3rem;
            background: #d6ad4b;
            border-radius: 0.5rem;
            font-family: 'Merriweather',serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #10233f;
        }
        .register-header .logo h1 {
            font-family: 'Merriweather',serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #10233f;
        }
        .register-header .subtitle {
            color: #68768a;
            font-size: 0.95rem;
        }
        .register-header .subtitle i { color: #a77915; }

        /* ----- PROGRESS STEPS ----- */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0 1.5rem 0;
            position: relative;
            gap: 0.5rem;
        }
        .progress-steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 2rem;
            right: 2rem;
            height: 2px;
            background: #e5e7eb;
            transform: translateY(-50%);
            z-index: 0;
        }
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            z-index: 1;
            flex: 1;
            cursor: pointer;
        }
        .progress-step .step-circle {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
            background: white;
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #9ca3af;
            transition: all 0.3s;
        }
        .progress-step .step-circle.active {
            border-color: #d6ad4b;
            background: #d6ad4b;
            color: #10233f;
        }
        .progress-step .step-circle.completed {
            border-color: #2d6545;
            background: #2d6545;
            color: white;
        }
        .progress-step .step-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #9ca3af;
            text-align: center;
            max-width: 4rem;
        }
        .progress-step .step-label.active { color: #17233c; }

        /* ----- FORM ELEMENTS ----- */
        .card {
            border: 1px solid #ded6c9;
            border-radius: 0.75rem;
            background: #fffcf6;
            padding: 1.25rem;
        }

        .field { display: flex; flex-direction: column; gap: 0.25rem; }
        .field label { font-weight: 700; font-size: 0.85rem; }
        .field label .required { color: #a84134; }
        .field input, .field select, .field textarea {
            padding: 0.7rem 0.75rem;
            border: 1px solid #cbd2db;
            border-radius: 0.5rem;
            background: white;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: #a77915; }
        .field textarea { resize: vertical; min-height: 4rem; }
        .field input:disabled, .field select:disabled { background: #f5f1e8; cursor: not-allowed; }

        .grid-2 { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
        .grid-3 { display: grid; gap: 1rem; grid-template-columns: repeat(3, 1fr); }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; gap: 0.5rem; }
        .flex-wrap { flex-wrap: wrap; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-5 { margin-top: 1.25rem; }
        .mt-6 { margin-top: 1.5rem; }
        .text-sm { font-size: 0.9rem; }
        .text-xs { font-size: 0.7rem; }
        .text-gold { color: #a77915; }
        .text-muted { color: #68768a; }
        .font-bold { font-weight: 700; }
        .font-serif { font-family: 'Merriweather',serif; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .border { border: 1px solid #ded6c9; }
        .border-t { border-top: 1px solid #ded6c9; }
        .rounded-lg { border-radius: 0.5rem; }
        .p-3 { padding: 0.75rem; }
        .p-4 { padding: 1rem; }

        /* ----- BUTTONS ----- */
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: none; border-radius: 0.5rem;
            background: #10233f; color: white;
            font-weight: 700; font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-primary:hover { background: #18345a; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-outline {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: 1px solid #bfc8d5; border-radius: 0.5rem;
            background: #fffcf6;
            font-weight: 600; font-size: 0.9rem;
            color: #17233c;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-outline:hover { background: #f5f1e8; }

        .btn-success {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: none; border-radius: 0.5rem;
            background: #2d6545; color: white;
            font-weight: 700; font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-success:hover { background: #1f4a32; }

        /* ----- DECLARATION ----- */
        .declaration-item {
            display: flex; align-items: flex-start; gap: 0.75rem;
            padding: 0.4rem 0;
        }
        .declaration-item input[type="checkbox"] {
            margin-top: 0.2rem;
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #2d6545;
            cursor: pointer;
        }

        /* ----- BED VISUAL ----- */
        .bed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem;
        }
        .bed-dot {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 50px;
            border: 2px solid #cbd2db;
            background: #f8f9fa;
            text-align: center;
        }
        .bed-dot.available {
            background: #e1f0e5;
            color: #2d6545;
            border-color: #2d6545;
        }
        .bed-dot.available:hover { 
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(45, 101, 69, 0.3);
        }
        .bed-dot.occupied {
            background: #f8e1dc;
            color: #9b3c31;
            border-color: #9b3c31;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .bed-dot.selected {
            background: #10233f;
            color: white;
            border-color: #10233f;
            transform: scale(1.05);
            box-shadow: 0 2px 12px rgba(16, 35, 63, 0.4);
        }
        .bed-dot .bed-label {
            font-size: 0.65rem;
            font-weight: 600;
        }
        .bed-dot .bed-status {
            font-size: 0.5rem;
            opacity: 0.7;
        }

        /* ----- SUCCESS SCREEN ----- */
        .success-screen {
            text-align: center;
            padding: 2rem;
        }
        .success-screen .success-icon {
            font-size: 4rem;
            color: #2d6545;
            margin-bottom: 1rem;
        }
        .success-screen .ref-number {
            font-family: 'Merriweather',serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #10233f;
            background: #e7edf5;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            display: inline-block;
            margin: 0.5rem 0;
        }
        .success-screen .qr-placeholder {
            width: 140px;
            height: 140px;
            margin: 1rem auto;
            background: white;
            border: 3px dashed #d6ad4b;
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #10233f;
            font-size: 0.8rem;
        }
        .success-screen .qr-placeholder i {
            font-size: 3rem;
            color: #d6ad4b;
            margin-bottom: 0.5rem;
        }
        .success-screen .student-detail-card {
            background: white;
            border-radius: 0.75rem;
            padding: 1.25rem;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid #eee8de;
        }
        .success-screen .student-detail-card .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #f0ebe3;
            font-size: 0.85rem;
        }
        .success-screen .student-detail-card .detail-row:last-child {
            border-bottom: none;
        }
        .success-screen .student-detail-card .detail-label {
            color: #68768a;
        }
        .success-screen .student-detail-card .detail-value {
            font-weight: 600;
        }

        /* ----- TOAST ----- */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            background: #10233f;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #3f755d; }
        .toast.error { background: #a84134; }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .loading-spinner i { font-size: 2rem; color: #a77915; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ----- HOSTEL INFO BADGE ----- */
        .hostel-info-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 999px;
            font-size: 0.6rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .hostel-info-badge.flat { background: #dbeafe; color: #1e40af; }
        .hostel-info-badge.floor-4 { background: #d1fae5; color: #065f46; }
        .hostel-info-badge.floor-6 { background: #fef3c7; color: #92400e; }

        /* ----- QR NOTICE ----- */
        .qr-notice {
            background: #f0f4f8;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border-left: 4px solid #d6ad4b;
            margin-top: 0.5rem;
        }
        .qr-notice i { color: #d6ad4b; margin-right: 0.5rem; }

        @media (max-width: 640px) {
            .register-container { padding: 1rem; }
            .register-header .logo h1 { font-size: 1.3rem; }
            .progress-step .step-label { font-size: 0.5rem; max-width: 3rem; }
            .progress-step .step-circle { width: 1.8rem; height: 1.8rem; font-size: 0.65rem; }
            .bed-grid { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); }
            .bed-dot { min-height: 40px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="register-container" id="registerContainer">

        <!-- Header -->
        <div class="register-header">
            <div class="logo">
                <div class="logo-badge">BIU</div>
                <h1>BedCheck Registration</h1>
            </div>
            <p class="subtitle"><i class="fas fa-user-graduate"></i> Benson Idahosa University · Complete your hostel registration</p>
        </div>

        <!-- Registration Content -->
        <div id="registrationContent">
            <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================
            // STUDENT REGISTRATION - Public (No Login Required)
            // =============================================

            const API_BASE = 'https://bedcheck-biu.onrender.com/api';

            // ---------- STATE ----------
            let hostels = [];
            let floorsFlats = [];
            let rooms = [];
            let bedSpaces = [];
            let isLoading = true;
            let currentStep = 1;
            let submitted = false;
            let occupiedBedIds = [];
            let studentData = {
                surname: '',
                firstName: '',
                middleName: '',
                gender: '',
                dob: '',
                phone: '',
                email: '',
                matric: '',
                faculty: '',
                department: '',
                level: '',
                session: '2025/2026',
                hostel_id: '',
                floor_flat_id: '',
                room_id: '',
                bed_space_id: '',
                hostel_name: '',
                floor_name: '',
                room_code: '',
                bed_code: '',
                status: 'Present',
                notes: '',
                emergency_name: '',
                emergency_relation: '',
                emergency_phone: '',
                declaration: false
            };

            // Faculty to Department mapping
            const facultyDepartments = {
                'Science': ['Computer Science', 'Microbiology', 'Geography', 'Mathematics', 'Physics', 'Chemistry', 'Biochemistry'],
                'Engineering': ['Electrical/Electronic', 'Mechanical', 'Civil', 'Chemical', 'Computer Engineering'],
                'Law': ['Law', 'International Law', 'Commercial Law'],
                'Allied Health': ['Nursing', 'Medical Lab Science', 'Public Health', 'Physiotherapy'],
                'Medicine': ['Medicine', 'Surgery', 'Pharmacology'],
                'Education': ['Instructional Design', 'Educational Technology', 'Curriculum Studies', 'Education Administration'],
                'Arts': ['English', 'History', 'Philosophy', 'Theatre Arts', 'Mass Communication']
            };

            // ---------- DOM REFS ----------
            const registrationContent = document.getElementById('registrationContent');

            // ---------- TOAST ----------
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = `toast ${type}`;
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }

            // ---------- API HELPERS ----------
            async function apiCall(endpoint, options = {}) {
                try {
                    const response = await fetch(`${API_BASE}${endpoint}`, {
                        ...options,
                        headers: {
                            'Content-Type': 'application/json',
                            ...(options.headers || {})
                        }
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errorText}`);
                    }
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.message || 'API error');
                    }
                    return data;
                } catch (error) {
                    showToast('Error: ' + error.message, 'error');
                    throw error;
                }
            }

            // ---------- DATA LOADING ----------
            async function loadAllData() {
                try {
                    isLoading = true;
                    renderLoading();

                    const [hostelsRes, floorsRes, roomsRes, bedRes] = await Promise.all([
                        apiCall('/hostels'),
                        apiCall('/floors-flats'),
                        apiCall('/rooms'),
                        apiCall('/bed-spaces')
                    ]);

                    hostels = hostelsRes.data || [];
                    floorsFlats = floorsRes.data || [];
                    rooms = roomsRes.data || [];
                    bedSpaces = bedRes.data || [];

                    console.log('📊 Data loaded:', {
                        hostels: hostels.length,
                        floorsFlats: floorsFlats.length,
                        rooms: rooms.length,
                        bedSpaces: bedSpaces.length
                    });

                    isLoading = false;
                    renderRegistrationForm();

                } catch (error) {
                    console.error('Load error:', error);
                    isLoading = false;
                    showToast('Error loading data: ' + error.message, 'error');
                    renderError();
                }
            }

            // ---------- RENDER FUNCTIONS ----------
            function renderLoading() {
                registrationContent.innerHTML = `
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                    <p class="text-center text-muted">Loading registration form...</p>
                `;
            }

            function renderError() {
                registrationContent.innerHTML = `
                    <div class="card mt-4" style="border-color:#a84134;background:#f9e2de;">
                        <div class="text-center p-4">
                            <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#a84134;"></i>
                            <h2 class="mt-3">Error Loading Data</h2>
                            <p class="text-muted">There was an error loading the registration form. Please refresh the page.</p>
                            <button class="btn-primary mt-3" onclick="location.reload()"><i class="fas fa-refresh"></i> Refresh</button>
                        </div>
                    </div>
                `;
            }

            function renderRegistrationForm() {
                if (submitted) {
                    renderSuccessScreen();
                    return;
                }

                const steps = [
                    { number: 1, label: 'Personal' },
                    { number: 2, label: 'Academic' },
                    { number: 3, label: 'Hostel' },
                    { number: 4, label: 'Emergency' },
                    { number: 5, label: 'Submit' }
                ];

                const html = `
                    <!-- Progress Steps -->
                    <div class="progress-steps">
                        ${steps.map((step, index) => {
                            const stepNum = index + 1;
                            let status = '';
                            if (stepNum === currentStep) status = 'active';
                            else if (stepNum < currentStep) status = 'completed';
                            return `
                                <div class="progress-step" onclick="window.goToStep(${stepNum})">
                                    <div class="step-circle ${status}">${status === 'completed' ? '<i class="fas fa-check"></i>' : stepNum}</div>
                                    <span class="step-label ${status}">${step.label}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- QR Notice - Removed profile picture upload -->
                    <div class="qr-notice text-sm">
                        <i class="fas fa-qrcode"></i>
                        <span>QR Code will be generated automatically after registration. No profile picture required.</span>
                    </div>

                    <!-- Form Section -->
                    <div class="card mt-3" id="formSection">
                        ${renderStepContent()}

                        <!-- Navigation Buttons -->
                        <div class="flex-between mt-6 pt-4 border-t flex-wrap gap-3">
                            <div>
                                ${currentStep > 1 ? `<button class="btn-outline" onclick="window.goToStep(${currentStep - 1})"><i class="fas fa-arrow-left"></i> Previous</button>` : ''}
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button class="btn-outline" onclick="window.saveDraft()"><i class="fas fa-save"></i> Save Draft</button>
                                ${currentStep < 5 ? `<button class="btn-primary" onclick="window.goToStep(${currentStep + 1})">Next <i class="fas fa-arrow-right"></i></button>` : ''}
                                ${currentStep === 5 ? `<button class="btn-success" onclick="window.submitRegistration()"><i class="fas fa-paper-plane"></i> Submit & Generate QR</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;

                registrationContent.innerHTML = html;
                updateStepIndicators();

                if (currentStep === 3) {
                    setTimeout(() => {
                        populateHostelDropdowns();
                        if (studentData.hostel_id) {
                            document.getElementById('hostelSelect').value = studentData.hostel_id;
                            populateHostelDropdowns();
                            if (studentData.floor_flat_id) {
                                setTimeout(() => {
                                    document.getElementById('floorSelect').value = studentData.floor_flat_id;
                                    updateRoomDependencies();
                                    if (studentData.room_id) {
                                        setTimeout(() => {
                                            document.getElementById('roomSelect').value = studentData.room_id;
                                            updateBedDependencies();
                                            if (studentData.bed_space_id) {
                                                setTimeout(() => {
                                                    document.getElementById('bedSelect').value = studentData.bed_space_id;
                                                }, 100);
                                            }
                                        }, 100);
                                    }
                                }, 100);
                            }
                        }
                    }, 100);
                }
            }

            function getHostelType(hostelName) {
                const flatHostels = ['Above Only', 'Balm of Gilead'];
                const floor4Hostels = ['Splendor', 'Grace', 'Champions', 'Hope', 'Love', 'Peace'];
                const floor6Hostels = ['Purpose', 'Destiny', 'Favour'];
                
                if (flatHostels.includes(hostelName)) return 'flat';
                if (floor4Hostels.includes(hostelName)) return 'floor-4';
                if (floor6Hostels.includes(hostelName)) return 'floor-6';
                return 'unknown';
            }

            function getHostelBadge(hostelName) {
                const type = getHostelType(hostelName);
                const labels = {
                    'flat': 'Flat (4 beds/room)',
                    'floor-4': 'Floor (4 beds/room)',
                    'floor-6': 'Floor (6 beds/room)'
                };
                return `<span class="hostel-info-badge ${type}">${labels[type] || ''}</span>`;
            }

            function renderStepContent() {
                const required = '<span class="required">*</span>';
                switch(currentStep) {
                    case 1:
                        return `
                            <h3 class="font-bold text-lg" style="color:#17233c;"><i class="fas fa-user text-gold"></i> Personal Information</h3>
                            <p class="text-sm text-muted mb-4">Provide your personal details</p>

                            <div class="grid-2 mt-4">
                                <div class="field">
                                    <label>Surname ${required}</label>

            function updateStepIndicators() {
                document.querySelectorAll('.progress-step').forEach((el, index) => {
                    const stepNum = index + 1;
                    const circle = el.querySelector('.step-circle');
                    const label = el.querySelector('.step-label');
                    circle.className = 'step-circle';
                    label.className = 'step-label';
                    if (stepNum === currentStep) {
                        circle.classList.add('active');
                        label.classList.add('active');
                    } else if (stepNum < currentStep) {
                        circle.classList.add('completed');
                        circle.innerHTML = '<i class="fas fa-check"></i>';
                    } else {
                        circle.textContent = stepNum;
                    }
                });
            }

            // ---------- FORM INTERACTIONS ----------
            function updateField(field, value) {
                studentData[field] = value;
            }

            function updateFacultyDepartments() {
                const faculty = document.getElementById('faculty')?.value;
                studentData.faculty = faculty;
                studentData.department = '';

                const deptSelect = document.getElementById('department');
                deptSelect.innerHTML = '<option value="">Select Department</option>';
                
                if (faculty && facultyDepartments[faculty]) {
                    facultyDepartments[faculty].forEach(dept => {
                        const opt = document.createElement('option');
                        opt.value = dept;
                        opt.textContent = dept;
                        deptSelect.appendChild(opt);
                    });
                }
            }

            function goToStep(step) {
                if (step > currentStep) {
                    if (!validateStep(currentStep)) {
                        return;
                    }
                }
                currentStep = step;
                renderRegistrationForm();
            }

            function validateStep(step) {
                const required = (id) => {
                    const el = document.getElementById(id);
                    return el && el.value && el.value.trim() !== '';
                };
                switch(step) {
                    case 1:
                        if (!required('surname') || !required('firstName') || !required('gender') || !required('dob') || !required('phone')) {
                            showToast('Please fill in all required personal information fields', 'error');
                            return false;
                        }
                        break;
                    case 2:
                        if (!required('matric') || !required('faculty') || !required('department') || !required('level') || !required('session')) {
                            showToast('Please fill in all required academic information fields', 'error');
                            return false;
                        }
                        break;
                    case 3:
                        const hostel = document.getElementById('hostelSelect')?.value;
                        const floor = document.getElementById('floorSelect')?.value;
                        const room = document.getElementById('roomSelect')?.value;
                        const bed = document.getElementById('bedSelect')?.value;
                        if (!hostel || !floor || !room || !bed) {
                            showToast('Please select hostel, floor, room and bed space', 'error');
                            return false;
                        }
                        break;
                    case 4:
                        if (!required('emergencyName') || !required('emergencyRelation') || !required('emergencyPhone')) {
                            showToast('Please fill in all emergency contact fields', 'error');
                            return false;
                        }
                        break;
                }
                return true;
            }

            // ---------- HOSTEL DEPENDENT DROPDOWNS ----------
            function populateHostelDropdowns() {
                const hostelId = document.getElementById('hostelSelect')?.value;
                if (!hostelId) return;

                const hostelFloors = floorsFlats.filter(f => f.hostel_id == parseInt(hostelId));

                const floorSelect = document.getElementById('floorSelect');
                floorSelect.innerHTML = '<option value="">Select Floor/Flat</option>';

                hostelFloors.sort((a, b) => {
                    const aNum = parseInt(a.name.replace(/[^0-9]/g, '')) || 0;
                    const bNum = parseInt(b.name.replace(/[^0-9]/g, '')) || 0;
                    return aNum - bNum;
                });

                hostelFloors.forEach(floor => {
                    const opt = document.createElement('option');
                    opt.value = floor.id;
                    const roomCount = rooms.filter(r => r.floor_flat_id === floor.id).length;
                    opt.textContent = `${floor.name} (${roomCount} rooms)`;
                    if (studentData.floor_flat_id == floor.id) opt.selected = true;
                    floorSelect.appendChild(opt);
                });

                if (studentData.floor_flat_id) {
                    setTimeout(updateRoomDependencies, 50);
                }
            }

            function updateHostelDependencies() {
                const hostelId = document.getElementById('hostelSelect')?.value;
                studentData.hostel_id = hostelId;
                studentData.floor_flat_id = '';
                studentData.room_id = '';
                studentData.bed_space_id = '';
                studentData.room_code = '';
                studentData.bed_code = '';

                const floorSelect = document.getElementById('floorSelect');
                floorSelect.innerHTML = '<option value="">Select Floor/Flat</option>';

                const roomSelect = document.getElementById('roomSelect');
                roomSelect.innerHTML = '<option value="">Select Room</option>';

                const bedSelect = document.getElementById('bedSelect');
                bedSelect.innerHTML = '<option value="">Select Bed</option>';

                document.getElementById('bedVisualContainer').style.display = 'none';
                document.getElementById('bedCountInfo').textContent = '';

                if (hostelId) {
                    populateHostelDropdowns();
                }
            }

            // ---------- ROOM DEPENDENT DROPDOWNS ----------
            function updateRoomDependencies() {
                const floorId = document.getElementById('floorSelect')?.value;
                studentData.floor_flat_id = floorId;

                if (!floorId) return;

                const floorRooms = rooms.filter(r => r.floor_flat_id == parseInt(floorId));

                const roomSelect = document.getElementById('roomSelect');
                roomSelect.innerHTML = '<option value="">Select Room</option>';

                floorRooms.sort((a, b) => {
                    const aNum = parseInt(a.room_code.replace(/[^0-9]/g, '')) || 0;
                    const bNum = parseInt(b.room_code.replace(/[^0-9]/g, '')) || 0;
                    return aNum - bNum;
                });

                floorRooms.forEach(room => {
                    const opt = document.createElement('option');
                    opt.value = room.id;
                    const bedCount = bedSpaces.filter(b => b.room_id === room.id).length;
                    opt.textContent = `${room.room_code} (${bedCount} beds)`;
                    if (studentData.room_id == room.id) opt.selected = true;
                    roomSelect.appendChild(opt);
                });

                document.getElementById('bedSelect').innerHTML = '<option value="">Select Bed</option>';
                document.getElementById('bedVisualContainer').style.display = 'none';
                document.getElementById('bedCountInfo').textContent = '';
                
                studentData.bed_space_id = '';
                studentData.bed_code = '';

                if (studentData.room_id) {
                    updateBedDependencies();
                }
            }

            // ---------- BED DEPENDENT DROPDOWNS ----------
            async function updateBedDependencies() {
                const roomId = document.getElementById('roomSelect')?.value;
                studentData.room_id = roomId;

                if (!roomId) return;

                const selectedRoom = rooms.find(r => r.id == parseInt(roomId));
                if (selectedRoom) {
                    studentData.room_code = selectedRoom.room_code;
                }

                const roomBeds = bedSpaces.filter(b => b.room_id == parseInt(roomId));

                const bedSelect = document.getElementById('bedSelect');
                bedSelect.innerHTML = '<option value="">Select Bed</option>';

                if (roomBeds.length === 0) {
                    const container = document.getElementById('bedVisualContainer');
                    container.style.display = 'none';
                    document.getElementById('bedCountInfo').textContent = '';
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = 'No bed spaces available for this room';
                    opt.disabled = true;
                    bedSelect.appendChild(opt);
                    return;
                }

                occupiedBedIds = [];
                try {
                    const studentsRes = await apiCall(`/students?room_id=${roomId}`);
                    if (studentsRes.data && studentsRes.data.length > 0) {
                        occupiedBedIds = studentsRes.data.map(s => s.bed_space_id).filter(id => id !== null);
                    }
                } catch (e) {
                    console.warn('Could not fetch occupied beds:', e);
                }

                roomBeds.sort((a, b) => {
                    const aNum = parseInt(a.bed_code.replace(/[^0-9]/g, '')) || 0;
                    const bNum = parseInt(b.bed_code.replace(/[^0-9]/g, '')) || 0;
                    return aNum - bNum;
                });

                const availableBeds = roomBeds.filter(b => !occupiedBedIds.includes(b.id));
                const occupiedCount = roomBeds.filter(b => occupiedBedIds.includes(b.id)).length;

                roomBeds.forEach(bed => {
                    const opt = document.createElement('option');
                    opt.value = bed.id;
                    const isOccupied = occupiedBedIds.includes(bed.id);
                    if (isOccupied) {
                        opt.textContent = `${bed.bed_code} (Occupied)`;
                        opt.disabled = true;
                    } else {
                        opt.textContent = `${bed.bed_code} (Available)`;
                    }
                    if (studentData.bed_space_id == bed.id && !isOccupied) opt.selected = true;
                    bedSelect.appendChild(opt);
                });

                renderBedVisual(roomBeds, occupiedBedIds);
                document.getElementById('bedCountInfo').textContent = 
                    `${availableBeds.length} available · ${occupiedCount} occupied · ${roomBeds.length} total`;
            }

            function renderBedVisual(beds, occupiedBeds) {
                const container = document.getElementById('bedVisualContainer');
                const visual = document.getElementById('bedVisual');
                
                if (beds.length === 0) {
                    container.style.display = 'none';
                    return;
                }
                
                container.style.display = 'block';
                visual.innerHTML = '';

                beds.sort((a, b) => {
                    const aNum = parseInt(a.bed_code.replace(/[^0-9]/g, '')) || 0;
                    const bNum = parseInt(b.bed_code.replace(/[^0-9]/g, '')) || 0;
                    return aNum - bNum;
                });

                beds.forEach(bed => {
                    const dot = document.createElement('div');
                    dot.className = 'bed-dot';
                    const isOccupied = occupiedBeds.includes(bed.id);
                    
                    if (isOccupied) {
                        dot.classList.add('occupied');
                        dot.innerHTML = `
                            <span class="bed-label">${bed.bed_code}</span>
                            <span class="bed-status">⛔ Occupied</span>
                        `;
                        dot.title = `${bed.bed_code} - Occupied`;
                    } else {
                        dot.classList.add('available');
                        dot.innerHTML = `
                            <span class="bed-label">${bed.bed_code}</span>
                            <span class="bed-status">✓ Available</span>
                        `;
                        dot.title = `${bed.bed_code} - Available`;
                        dot.onclick = function(e) {
                            e.stopPropagation();
                            document.getElementById('bedSelect').value = bed.id;
                            document.querySelectorAll('.bed-dot').forEach(d => d.classList.remove('selected'));
                            this.classList.add('selected');
                            studentData.bed_space_id = bed.id;
                            studentData.bed_code = bed.bed_code;
                            showToast(`Selected ${bed.bed_code}`, 'success');
                        };
                        if (studentData.bed_space_id == bed.id) {
                            dot.classList.add('selected');
                        }
                    }
                    visual.appendChild(dot);
                });
            }

            function onBedSelect() {
                const bedSelect = document.getElementById('bedSelect');
                const selectedId = bedSelect.value;
                if (selectedId) {
                    const bed = bedSpaces.find(b => b.id == parseInt(selectedId));
                    if (bed) {
                        studentData.bed_space_id = bed.id;
                        studentData.bed_code = bed.bed_code;
                        document.querySelectorAll('.bed-dot').forEach(d => d.classList.remove('selected'));
                        const dots = document.querySelectorAll('.bed-dot');
                        dots.forEach(d => {
                            if (d.textContent.includes(bed.bed_code)) {
                                d.classList.add('selected');
                            }
                        });
                    }
                }
            }

            // ---------- SAVE DRAFT ----------
            function saveDraft() {
                const fields = ['surname', 'firstName', 'middleName', 'gender', 'dob', 'phone', 'email', 
                               'matric', 'faculty', 'department', 'level', 'session', 'notes',
                               'emergency_name', 'emergency_relation', 'emergency_phone'];
                fields.forEach(f => {
                    const el = document.getElementById(f);
                    if (el) studentData[f] = el.value;
                });
                const hostelSelect = document.getElementById('hostelSelect');
                if (hostelSelect) studentData.hostel_id = hostelSelect.value;
                const floorSelect = document.getElementById('floorSelect');
                if (floorSelect) studentData.floor_flat_id = floorSelect.value;
                const roomSelect = document.getElementById('roomSelect');
                if (roomSelect) studentData.room_id = roomSelect.value;
                const bedSelect = document.getElementById('bedSelect');
                if (bedSelect) studentData.bed_space_id = bedSelect.value;

                localStorage.setItem('studentRegistrationDraft', JSON.stringify(studentData));
                showToast('Draft saved successfully!', 'success');
            }

            // ---------- SUBMIT REGISTRATION ----------
            async function submitRegistration() {
                for (let i = 1; i <= 5; i++) {
                    if (!validateStep(i)) {
                        currentStep = i;
                        renderRegistrationForm();
                        return;
                    }
                }

                if (!studentData.declaration) {
                    showToast('Please agree to the declaration', 'error');
                    return;
                }

                const hostel = hostels.find(h => h.id == parseInt(studentData.hostel_id));
                const floor = floorsFlats.find(f => f.id == parseInt(studentData.floor_flat_id));
                const room = rooms.find(r => r.id == parseInt(studentData.room_id));
                const bed = bedSpaces.find(b => b.id == parseInt(studentData.bed_space_id));

                try {
                    const existing = await apiCall(`/students?search=${studentData.matric}`);
                    if (existing.data && existing.data.length > 0) {
                        showToast('Matric number already exists!', 'error');
                        return;
                    }
                } catch (e) {}

                // Generate QR code ID
                const qrId = `BIU-${studentData.matric.replace(/[^A-Z0-9]/g, '')}`;

                const newStudent = {
                    name: `${studentData.surname} ${studentData.firstName} ${studentData.middleName}`.trim(),
                    matric: studentData.matric,
                    gender: studentData.gender,
                    phone: studentData.phone,
                    email: studentData.email || null,
                    faculty: studentData.faculty,
                    department: studentData.department,
                    level: studentData.level,
                    session: studentData.session,
                    hostel_id: parseInt(studentData.hostel_id) || null,
                    hostel_name: hostel?.name || null,
                    floor_flat_id: parseInt(studentData.floor_flat_id) || null,
                    floor_name: floor?.name || null,
                    room_id: parseInt(studentData.room_id) || null,
                    room_code: room?.room_code || studentData.room_code || null,
                    bed_space_id: parseInt(studentData.bed_space_id) || null,
                    bed_code: bed?.bed_code || studentData.bed_code || null,
                    status: studentData.status || 'Present',
                    notes: studentData.notes || null,
                    emergency_name: studentData.emergency_name,
                    emergency_relation: studentData.emergency_relation,
                    emergency_phone: studentData.emergency_phone,
                    qr_code: qrId,
                    qr_generated: true
                };

                try {
                    const result = await apiCall('/students', {
                        method: 'POST',
                        body: JSON.stringify(newStudent)
                    });

                    if (studentData.bed_space_id) {
                        await apiCall(`/bed-spaces/${studentData.bed_space_id}`, {
                            method: 'PATCH',
                            body: JSON.stringify({ 
                                status: 'occupied',
                                student_id: result.data.id
                            })
                        });
                    }

                    submitted = true;
                    renderSuccessScreen(result.data);
                    showToast('Registration submitted successfully! QR Code generated.', 'success');
                    localStorage.removeItem('studentRegistrationDraft');

                } catch (error) {
                    showToast('Error submitting registration: ' + error.message, 'error');
                }
            }

            // ---------- SUCCESS SCREEN ----------
            function renderSuccessScreen(data) {
                const refNumber = data?.id ? `BC-2026-${String(data.id).padStart(6, '0')}` : 'BC-2026-000245';
                const qrId = data?.qr_code || `BIU-${data?.matric?.replace(/[^A-Z0-9]/g, '') || 'UNKNOWN'}`;
                const studentName = data?.name || `${studentData.surname} ${studentData.firstName}`.trim();
                const hostelName = data?.hostel_name || hostels.find(h => h.id == parseInt(studentData.hostel_id))?.name || '—';
                const roomCode = data?.room_code || studentData.room_code || '—';
                const bedCode = data?.bed_code || studentData.bed_code || '—';

                registrationContent.innerHTML = `
                    <div class="card mt-4" style="border-color:#2d6545;background:#e1f0e5;">
                        <div class="success-screen">
                            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                            <h2 class="font-serif text-2xl font-bold" style="color:#14532d;">Registration Submitted Successfully</h2>
                            <p class="text-sm text-muted mt-1">QR Code generated for BedCheck verification</p>

                            <div class="student-detail-card mt-4">
                                <div class="qr-placeholder">
                                    <i class="fas fa-qrcode"></i>
                                    <span style="font-size:0.7rem;font-weight:700;">${qrId}</span>
                                </div>
                                <h4 style="font-size:1.1rem;font-weight:700;color:#17233c;">${studentName}</h4>
                                <p style="font-size:0.85rem;color:#68768a;">${data?.matric || studentData.matric}</p>
                                <div class="mt-2" style="border-top:1px solid #eee8de;padding-top:0.75rem;">
                                    <div class="detail-row">
                                        <span class="detail-label">Hostel</span>
                                        <span class="detail-value">${hostelName}</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">Room</span>
                                        <span class="detail-value">${roomCode}</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">Bed</span>
                                        <span class="detail-value">${bedCode}</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">Status</span>
                                        <span class="detail-value" style="color:#d09b2e;">Pending Fingerprint</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">Reference</span>
                                        <span class="detail-value" style="font-size:0.8rem;">${refNumber}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-3 mt-5 justify-center flex-wrap">
                                <button class="btn-success" onclick="window.downloadQR()"><i class="fas fa-download"></i> Download QR</button>
                                <button class="btn-outline" onclick="window.printSlip()"><i class="fas fa-print"></i> Print Slip</button>
                                <button class="btn-primary" onclick="window.resetRegistration()"><i class="fas fa-plus"></i> Register Another</button>
                            </div>

                            <p class="text-sm text-muted mt-4">
                                <i class="fas fa-info-circle"></i> Present this QR during BedCheck verification. 
                                You can also re-download it from the portal.
                            </p>
                        </div>
                    </div>
                `;
            }

            function downloadQR() {
                showToast('QR Code download will be available soon.', 'info');
            }

            function printSlip() {
                window.print();
            }

            function resetRegistration() {
                studentData = {
                    surname: '', firstName: '', middleName: '', gender: '', dob: '', phone: '', email: '',
                    matric: '', faculty: '', department: '', level: '', session: '2025/2026',
                    hostel_id: '', floor_flat_id: '', room_id: '', bed_space_id: '',
                    hostel_name: '', floor_name: '', room_code: '', bed_code: '',
                    status: 'Present', notes: '',
                    emergency_name: '', emergency_relation: '', emergency_phone: '',
                    declaration: false
                };
                submitted = false;
                currentStep = 1;
                localStorage.removeItem('studentRegistrationDraft');
                renderRegistrationForm();
            }

            // ---------- INIT ----------
            function init() {
                loadAllData();
            }

            // expose to window
            window.showToast = showToast;
            window.goToStep = goToStep;
            window.updateField = updateField;
            window.updateFacultyDepartments = updateFacultyDepartments;
            window.updateHostelDependencies = updateHostelDependencies;
            window.updateRoomDependencies = updateRoomDependencies;
            window.updateBedDependencies = updateBedDependencies;
            window.onBedSelect = onBedSelect;
            window.saveDraft = saveDraft;
            window.submitRegistration = submitRegistration;
            window.populateHostelDropdowns = populateHostelDropdowns;
            window.resetRegistration = resetRegistration;
            window.downloadQR = downloadQR;
            window.printSlip = printSlip;

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
